<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MLBPro · Casar Series TEST</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; }
  header { padding:14px 16px; border-bottom:1px solid #30363d; }
  h1 { font-size:17px; margin:0; }
  main { padding:16px; max-width:900px; margin:0 auto; }
  label { font-size:13px; color:#8b949e; display:block; margin-bottom:6px; }
  select { width:100%; padding:14px; font-size:16px; background:#161b22; color:#e6edf3; border:1px solid #30363d; border-radius:10px; margin-bottom:12px; }
  .go { width:100%; border:0; border-radius:10px; padding:16px; font-size:16px; font-weight:800; color:#fff; background:#238636; cursor:pointer; margin-bottom:8px; }
  .go-viento { width:100%; border:0; border-radius:10px; padding:16px; font-size:16px; font-weight:800; color:#fff; background:#1f6feb; cursor:pointer; margin-bottom:8px; }

  .serie { background:#161b22; border:1px solid #30363d; border-radius:14px; padding:14px; margin-top:14px; }
  .serie .cab { font-size:15px; font-weight:800; }
  .serie .sub { font-size:12px; color:#8b949e; margin:3px 0 8px; }
  .serie .prom { font-size:13px; color:#c9d1d9; margin-bottom:8px; }
  .serie .prom b { color:#fff; }
  .jrow { font-size:12px; color:#c9d1d9; padding:5px 0; border-top:1px solid #21262d; display:flex; justify-content:space-between; gap:8px; }
  .jrow .f { color:#79c0ff; }
  .jrow .r { color:#3fb950; font-weight:700; }
  .tag-sube { color:#3fb950; } .tag-baja { color:#ff7b72; } .tag-est { color:#d29922; }

  .rv-bloque { border-radius:12px; margin-top:14px; overflow:hidden; border-width:2px; border-style:solid; }
  .rv-bloque.verde   { border-color:#3fb950; }
  .rv-bloque.amarillo{ border-color:#d29922; }
  .rv-bloque.rojo    { border-color:#f85149; }
  .rv-bloque.gris    { border-color:#484f58; }

  .rv-cab {
    background:#161b22;
    padding:14px 16px 10px;
    display:flex; flex-direction:column; align-items:center; gap:5px;
    border-bottom:1px solid #21262d;
  }
  .rv-equipo { font-size:14px; font-weight:800; color:#e6edf3; }
  .rv-parque { font-size:10px; color:#6e7681; }
  .rv-rango  { font-size:13px; font-weight:700; color:#58a6ff; margin-top:2px; }
  .rv-meta   { font-size:10px; color:#6e7681; }
  .rv-favor  { font-size:11px; font-weight:800; padding:3px 10px; border-radius:6px; margin-top:4px; }
  .rv-favor.si  { color:#3fb950; background:#1a2f1e; border:1px solid #3fb950; }
  .rv-favor.no  { color:#f85149; background:#2f1a1a; border:1px solid #f85149; }
  .rv-favor.nc  { color:#8b949e; background:#21262d; border:1px solid #484f58; }
  .viento-va-chip { display:block; text-align:center; background:#ff2222; color:#fff; font-weight:800; font-size:15px; padding:6px 14px; border-radius:8px; margin-top:6px; letter-spacing:0.5px; }
  .viento-va-chip .flecha { font-size:16px; margin:0 4px; }

  .rv-fila {
    background:#161b22;
    display:grid;
    grid-template-columns: 90px 52px 52px 1fr;
    align-items:center;
    padding:8px 14px;
    border-bottom:1px solid #21262d;
    gap:6px;
  }
  .rv-fila:last-child { border-bottom:none; }
  .rv-fecha { font-size:11px; color:#58a6ff; }
  .rv-vs    { font-size:10px; color:#8b949e; }
  .rv-dir   { font-size:13px; font-weight:700; color:#58a6ff; text-align:center; background:#0d1117; border:1px solid #1f4f8f; border-radius:5px; padding:3px 0; }
  .rv-temp  { font-size:12px; color:#e6edf3; text-align:center; background:#0d1117; border:1px solid #30363d; border-radius:5px; padding:3px 0; }
  .rv-marc  { font-size:13px; font-weight:700; color:#3fb950; text-align:right; }
  .rv-total { font-size:10px; color:#6e7681; }

  #console { margin-top:16px; background:#010409; border:1px solid #30363d; border-radius:8px; padding:12px; min-height:50px; max-height:25vh; overflow:auto; font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
</style>
</head>
<body>
<header><h1>MLBPro · Casar SERIES por temporada (TEST)</h1></header>
<a href="index.html" style="display:block; text-align:center; color:#5b9fd8; font-size:13px; padding:8px; text-decoration:none;">← Volver al inicio</a>
<main>
  <label>Equipo local (de lo que hay en cache):</label>
  <select id="parque"></select>
  <button id="go" class="go">CASAR SERIES DE ESTE PARQUE</button>
  <button id="goViento" class="go-viento">VER POR RANGO DE VIENTO</button>
  <button id="goExportar" class="go-viento" style="background:#8957e5;">EXPORTAR CACHE (para revisar)</button>

  <label style="margin-top:14px;">Viento mínimo para la conclusión (mph, 0 = todos):</label>
  <input type="number" id="vientoMin" min="0" step="1" value="0" style="width:100%; padding:12px; font-size:15px; background:#161b22; color:#e6edf3; border:1px solid #30363d; border-radius:8px; margin-bottom:8px;" />
  <button id="goConclusion" class="go-viento" style="background:#238636;">CONCLUSIÓN GENERAL FAVORABLE/DESFAVORABLE</button>

  <div id="lista"></div>
  <div id="console">Elige un parque y pulsa el botón.</div>
</main>

<script src="mlb-routes.js"></script>
<script src="estadios.js"></script>
<script src="clima-cache.js"></script>
<script src="parques-orientacion.js?v=3"></script>

<script>
  var consoleEl = document.getElementById("console");
  var listaEl   = document.getElementById("lista");
  var selParque = document.getElementById("parque");

  function log(t){ var d=document.createElement("div"); d.textContent=t; consoleEl.appendChild(d); consoleEl.scrollTop=consoleEl.scrollHeight; }

  function vientoFavorable(windDir, hpACF) {
    if (hpACF===null || hpACF===undefined) return null;
    var opuesto = (hpACF + 180) % 360;
    var diff = Math.abs(windDir - opuesto);
    if (diff > 180) diff = 360 - diff;
    return diff <= 90;
  }

  (function llenarParques(){
    try {
      var cache = (typeof climaLeerCache==="function") ? climaLeerCache() : [];
      if(!cache.length){ log("CACHE VACIO. Abre el index y pulsa COINCIDENCIA para llenar el cache."); return; }
      var set={};
      for(var i=0;i<cache.length;i++){
        if(cache[i]&&cache[i].venue&&cache[i].home_team) set[cache[i].venue]=cache[i].home_team;
      }
      var parques=Object.keys(set).sort(function(a,b){ return set[a]<set[b]?-1:(set[a]>set[b]?1:0); });
      for(var j=0;j<parques.length;j++){
        var o=document.createElement("option"); o.value=parques[j];
        o.textContent=set[parques[j]]+" · "+parques[j]; selParque.appendChild(o);
      }
      log("Equipos en cache: "+parques.length+". Filas totales: "+cache.length);
    } catch(e){ log("ERROR llenando parques: "+e.message); }
  })();

  function casarSeries(cache,venue){
    var juegos=cache.filter(function(g){ return g&&g.venue===venue&&g.date; });
    juegos.sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:0); });
    var series=[],actual=null;
    for(var i=0;i<juegos.length;i++){
      var g=juegos[i], visit=g.away_team||g.away||"?", fecha=g.date;
      if(actual&&actual.visit===visit&&diffDias(actual.ultFecha,fecha)<=4){
        actual.juegos.push(g); actual.ultFecha=fecha;
      } else {
        if(actual) series.push(actual);
        actual={visit:visit,home:(g.home_team||g.home||venue),iniFecha:fecha,ultFecha:fecha,juegos:[g]};
      }
    }
    if(actual) series.push(actual);
    series.sort(function(a,b){ return a.iniFecha<b.iniFecha?1:-1; });
    return series;
  }

  function diffDias(d1,d2){
    var a=new Date(d1+"T00:00:00"),b=new Date(d2+"T00:00:00");
    return Math.abs((b-a)/(1000*60*60*24));
  }

  function carrerasDe(g){
    var ar=g.away_runs,hr=g.home_runs;
    if(ar!==null&&ar!==undefined&&hr!==null&&hr!==undefined) return Number(ar)+Number(hr);
    return null;
  }

  function fechaCorta(d){
    if(!d) return "—";
    var meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    var p=d.split("-");
    return meses[parseInt(p[1],10)-1]+" "+parseInt(p[2],10)+", "+p[0].slice(2);
  }

  // FASE B (arreglo de hoy):
  // 1) El parque ahora rota por 'hp' DIRECTO, sin sumarle 180 — el +180
  //    de mas quedaba corrido. Confirmado contra k6-test.html.
  // 2) La flecha del viento vuelve a apuntar hacia VA_HACIA (hacia donde
  //    va el viento), no vieneDe — convencion original de esta sesion,
  //    revertida sin querer en la version anterior. Vuelve a coincidir
  //    con k6-test.html e index.html (ya corregido tambien).
  function svgBrujula(hpACF, promDir) {
    var cx=100, cy=100;
    if (hpACF===null || hpACF===undefined) {
      return '<svg width="200" height="205" viewBox="0 0 200 205" style="display:block;margin:0 auto">'+
        '<circle cx="'+cx+'" cy="'+cy+'" r="95" fill="none" stroke="#333" stroke-width="1"/>'+
        '<text x="'+cx+'" y="'+cy+'" fill="#8b949e" font-size="13" font-weight="700" text-anchor="middle">NO_CONFIRMADO</text>'+
      '</svg>';
    }
    var hp = hpACF;
    var puntos16=[
      {g:0,t:"N"},{g:22.5,t:"NNE"},{g:45,t:"NE"},{g:67.5,t:"ENE"},
      {g:90,t:"E"},{g:112.5,t:"ESE"},{g:135,t:"SE"},{g:157.5,t:"SSE"},
      {g:180,t:"S"},{g:202.5,t:"SSW"},{g:225,t:"SW"},{g:247.5,t:"WSW"},
      {g:270,t:"W"},{g:292.5,t:"WNW"},{g:315,t:"NW"},{g:337.5,t:"NNW"}
    ];
    var cardHtml="", degHtml="";
    puntos16.forEach(function(p){
      var gAjustado = p.g;
      cardHtml+='<g transform="rotate('+gAjustado+' '+cx+' '+cy+')"><text x="'+cx+'" y="14" font-size="9" font-weight="700" fill="#9b59ff" text-anchor="middle">'+p.t+'</text></g>';
      degHtml+='<g transform="rotate('+gAjustado+' '+cx+' '+cy+')"><text x="'+cx+'" y="38" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">'+Math.round(p.g)+'°</text></g>';
    });

    var promDirVieneDe = ((Number(promDir)%360)+360)%360;
    var promDirVaHacia = (promDirVieneDe + 180) % 360;

    return '<svg width="200" height="205" viewBox="0 0 200 205" style="display:block;margin:0 auto">'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="95" fill="none" stroke="#333" stroke-width="1"/>'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="68" fill="none" stroke="#333" stroke-width="1"/>'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="66" fill="#0e1420" stroke="#222" stroke-width="1"/>'+
      cardHtml + degHtml +
      '<g transform="rotate('+(((hp%360)+360)%360)+' '+cx+' '+cy+')">'+
        '<line x1="'+cx+'" y1="'+(cy+60)+'" x2="'+cx+'" y2="'+(cy-60)+'" stroke="#ff9f0a" stroke-width="1" stroke-dasharray="3,3" opacity="0.8"/>'+
        '<path d="M '+cx+' '+(cy+42)+' L '+(cx-45)+' '+(cy-21)+' A 60 60 0 0 1 '+(cx+45)+' '+(cy-21)+' Z" fill="#1a4d2e" stroke="#2d7a4a" stroke-width="1" opacity="0.9"/>'+
        '<path d="M '+(cx-21)+' '+(cy+42)+' Q '+cx+' '+(cy+18)+' '+(cx+21)+' '+(cy+42)+'" fill="none" stroke="#c9a94d" stroke-width="1" opacity="0.8"/>'+
        '<path d="M '+(cx-27)+' '+(cy+42)+' Q '+cx+' '+(cy+9)+' '+(cx+27)+' '+(cy+42)+'" fill="none" stroke="#c9a94d" stroke-width="0.7" opacity="0.5"/>'+
        '<g stroke="#c9a94d" stroke-width="1.5" fill="none">'+
          '<polygon points="'+cx+','+cy+' '+(cx+18)+','+(cy+21)+' '+cx+','+(cy+42)+' '+(cx-18)+','+(cy+21)+'"/>'+
          '<circle cx="'+cx+'" cy="'+cy+'" r="2.5" fill="#c9a94d"/>'+
          '<circle cx="'+(cx+18)+'" cy="'+(cy+21)+'" r="2" fill="#c9a94d"/>'+
          '<circle cx="'+cx+'" cy="'+(cy+42)+'" r="2" fill="#c9a94d"/>'+
          '<circle cx="'+(cx-18)+'" cy="'+(cy+21)+'" r="2" fill="#c9a94d"/>'+
        '</g>'+
      '</g>'+
      '<g transform="rotate('+promDirVaHacia+' '+cx+' '+cy+')">'+
        '<line x1="'+cx+'" y1="'+(cy+25)+'" x2="'+cx+'" y2="'+(cy-19)+'" stroke="#ff2222" stroke-width="2" stroke-linecap="round"/>'+
        '<polygon points="'+cx+','+(cy-23)+' '+(cx-6)+','+(cy-9)+' '+(cx+6)+','+(cy-9)+'" fill="#ff2222"/>'+
        '<circle cx="'+cx+'" cy="'+(cy+25)+'" r="6" fill="#ff2222" stroke="#fff" stroke-width="1.5"/>'+
      '</g>'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="#ff2222" opacity="0.9"/>'+
      '<rect x="'+(cx-24)+'" y="'+(cy-6)+'" width="48" height="14" rx="3" fill="#0d1117" opacity="0.85"/>'+
      '<text x="'+cx+'" y="'+(cy+4)+'" fill="#58a6ff" font-size="9" font-family="monospace" font-weight="700" text-anchor="middle">~'+Math.round(promDirVaHacia)+'°</text>'+
    '</svg>';
  }

  document.getElementById("go").addEventListener("click", function(){
    consoleEl.textContent=""; listaEl.innerHTML="";
    var venue=selParque.value;
    if(!venue){ log("Elige un parque."); return; }
    try {
      var cache=climaLeerCache();
      var series=casarSeries(cache,venue);
      log(venue+": "+series.length+" series encontradas.");
      if(!series.length){ log("Sin series para este parque."); return; }
      var html="";
      for(var s=0;s<series.length;s++){
        var se=series[s],sumC=0,nC=0,sumV=0,nV=0,sumT=0,nT=0,filas="",carrerasArr=[];
        for(var k=0;k<se.juegos.length;k++){
          var g=se.juegos[k],c=carrerasDe(g);
          var marc=(g.away_runs!==undefined&&g.away_runs!==null&&g.home_runs!==undefined&&g.home_runs!==null)?(g.away_runs+"-"+g.home_runs):"—";
          if(c!==null){sumC+=c;nC++;carrerasArr.push(c);}
          if(typeof g.windspeed_mph==="number"){sumV+=g.windspeed_mph;nV++;}
          if(typeof g.temperature_f==="number"){sumT+=g.temperature_f;nT++;}
          var dirTxt=(g.wind_dir!==undefined&&g.wind_dir!==null&&g.wind_dir!=="")?"dir "+g.wind_dir:"dir —";
          filas+='<div class="jrow"><span class="f">'+g.date+'</span>'+
            '<span>'+(typeof g.temperature_f==="number"?Math.round(g.temperature_f)+"°":"—")+
            ' · v'+(typeof g.windspeed_mph==="number"?g.windspeed_mph.toFixed(0):"—")+
            ' · '+dirTxt+'</span>'+
            '<span class="r">'+marc+(c!==null?' ('+c+')':'')+'</span></div>';
        }
        var promC=nC>0?(sumC/nC).toFixed(1):"—";
        var tend="",tendCls="tag-est";
        if(carrerasArr.length>=2){
          var dd=carrerasArr[carrerasArr.length-1]-carrerasArr[0];
          if(dd>=2){tend="SUBE";tendCls="tag-sube";}
          else if(dd<=-2){tend="BAJA";tendCls="tag-baja";}
          else{tend="ESTABLE";tendCls="tag-est";}
        }
        html+='<div class="serie">'+
          '<div class="cab">'+se.visit+' @ '+se.home+'</div>'+
          '<div class="sub">'+se.iniFecha+' → '+se.ultFecha+' · '+se.juegos.length+' juego(s)'+(tend?' · <span class="'+tendCls+'">'+tend+'</span>':'')+'</div>'+
          '<div class="prom">Carreras promedio serie: <b>'+promC+'</b>'+
            ' · temp '+(nT>0?(sumT/nT).toFixed(0)+'°':'—')+
            ' · viento '+(nV>0?(sumV/nV).toFixed(1):'—')+'</div>'+
          filas+'</div>';
      }
      listaEl.innerHTML=html;
      log("LISTO.");
    } catch(e){ log("ERROR: "+e.message); }
  });

  document.getElementById("goViento").addEventListener("click", function(){
    consoleEl.textContent=""; listaEl.innerHTML="";
    var venue=selParque.value;
    if(!venue){ log("Elige un parque."); return; }
    try {
      var cache=climaLeerCache();
      var hpACF=(typeof getOrientacionParque==="function")?getOrientacionParque(venue):null;

      var homeTeam="";
      for(var ii=0;ii<cache.length;ii++){
        if(cache[ii]&&cache[ii].venue===venue&&cache[ii].home_team){ homeTeam=cache[ii].home_team; break; }
      }

      var juegos=cache.filter(function(g){
        return g&&g.venue===venue&&g.date&&
               g.wind_dir!==undefined&&g.wind_dir!==null&&g.wind_dir!==""&&
               !isNaN(Number(g.wind_dir));
      });
      log("Juegos con dirección de viento: "+juegos.length);
      if(!juegos.length){ log("Sin juegos con dirección de viento para este parque."); return; }
      if(hpACF===null){ log("AVISO: orientación de "+venue+" NO_CONFIRMADO — se muestra el viento pero sin FAVORABLE/DESFAVORABLE."); }

      var etiquetas=[
        "0°–30°","30°–60°","60°–90°","90°–120°","120°–150°","150°–180°",
        "180°–210°","210°–240°","240°–270°","270°–300°","300°–330°","330°–360°"
      ];
      var rangos={};
      for(var e=0;e<etiquetas.length;e++) rangos[etiquetas[e]]=[];
      for(var i=0;i<juegos.length;i++){
        var g=juegos[i],dir=Number(g.wind_dir)%360;
        if(dir<0) dir+=360;
        var idx=Math.floor(dir/30); if(idx>11) idx=11;
        rangos[etiquetas[idx]].push(g);
      }

      var html="";
      for(var r=0;r<etiquetas.length;r++){
        var lbl=etiquetas[r],gs=rangos[lbl];
        if(!gs.length) continue;

        gs.sort(function(a,b){ return Number(a.wind_dir)-Number(b.wind_dir); });

        var sumC=0,nC=0,sumT=0,nT=0,sumDir=0,nDir=0,sumV=0,nV=0;
        for(var k=0;k<gs.length;k++){
          var gk=gs[k],c=carrerasDe(gk);
          if(c!==null){sumC+=c;nC++;}
          if(typeof gk.temperature_f==="number"){sumT+=gk.temperature_f;nT++;}
          if(!isNaN(Number(gk.wind_dir))){sumDir+=Number(gk.wind_dir);nDir++;}
          if(typeof gk.windspeed_mph==="number"){sumV+=gk.windspeed_mph;nV++;}
        }
        var promC=nC>0?(sumC/nC).toFixed(1):"—";
        var promDir=nDir>0?sumDir/nDir:parseInt(lbl)+15;
        var promV=nV>0?(sumV/nV):null;

        var colorCls="amarillo";
        if(nC>0){
          if(sumC/nC>=11) colorCls="verde";
          else if(sumC/nC<8) colorCls="rojo";
        }

        var esFavor = vientoFavorable(promDir, hpACF);
        var favorHtml;
        if (esFavor===null) {
          favorHtml = '<div class="rv-favor nc">NO_CONFIRMADO (orientación de parque sin medir)</div>';
          colorCls = "gris";
        } else {
          favorHtml = '<div class="rv-favor '+(esFavor?"si":"no")+'">'+
            (esFavor ? "FAVORABLE (empuja la bola)" : "DESFAVORABLE (frena la bola)")+
            '</div>';
        }

        var filas="";
        for(var k2=0;k2<gs.length;k2++){
          var gk2=gs[k2],c2=carrerasDe(gk2);
          var marc=(gk2.away_runs!==undefined&&gk2.away_runs!==null&&gk2.home_runs!==undefined&&gk2.home_runs!==null)?(gk2.away_runs+"-"+gk2.home_runs):"—";
          var visitante=gk2.away_team||"?";
          filas+=
            '<div class="rv-fila">'+
              '<div>'+
                '<div class="rv-fecha">'+fechaCorta(gk2.date)+'</div>'+
                '<div class="rv-vs">vs '+visitante+'</div>'+
              '</div>'+
              '<div class="rv-dir">'+Math.round((Number(gk2.wind_dir)+180)%360)+'°<div style="font-size:9px;color:#8b949e;font-weight:500;margin-top:1px;">'+(typeof gk2.windspeed_mph==="number"?gk2.windspeed_mph.toFixed(0)+' mph':'—')+'</div><div style="font-size:8px;color:#6e7681;font-weight:500;margin-top:1px;">sale de '+gk2.wind_dir+'°</div></div>'+
              '<div class="rv-temp">'+(typeof gk2.temperature_f==="number"?Math.round(gk2.temperature_f)+"°":"—")+'</div>'+
              '<div class="rv-marc">'+marc+(c2!==null?' <span class="rv-total">('+c2+')</span>':'')+'</div>'+
            '</div>';
        }

        var promDirVaHaciaTxt = Math.round((Math.round(((Number(promDir)%360)+360)%360)+180)%360);
        var promDirVieneDeTxt = Math.round(((Number(promDir)%360)+360)%360);

        var loBucket = r*30, hiBucket = loBucket+30;
        var vaLo = (loBucket+180)%360, vaHi = (hiBucket+180)%360;
        var lblVa = vaLo+'°–'+vaHi+'°';

        html+=
          '<div class="rv-bloque '+colorCls+'">'+
            '<div class="rv-cab">'+
              '<div class="rv-equipo">'+homeTeam+'</div>'+
              '<div class="rv-parque">'+venue+'</div>'+
              svgBrujula(hpACF, promDir)+
              '<div class="viento-va-chip">'+promDirVieneDeTxt+'° <span class="flecha">➜</span> '+promDirVaHaciaTxt+'°</div>'+
              '<div style="text-align:center;font-size:12px;color:#8b949e;margin-top:2px;">viento promedio <b style="color:#58a6ff">'+(promV!==null?promV.toFixed(1)+' mph':'—')+'</b></div>'+
              '<div class="rv-rango">Viento (viene de) '+lbl+' <span style="color:#6e7681;">→ va hacia '+lblVa+'</span></div>'+
              favorHtml+
              '<div class="rv-meta">'+gs.length+' juego(s) · viento avg <b style="color:#e6edf3">'+(promV!==null?promV.toFixed(1)+' mph':'—')+'</b> · prom <b style="color:#e6edf3">'+promC+'</b> carreras</div>'+
            '</div>'+
            filas+
          '</div>';
      }

      listaEl.innerHTML=html||'<div style="color:#8b949e;margin-top:14px;">Sin datos suficientes.</div>';
      log("LISTO.");
    } catch(e){ log("ERROR: "+e.message); }
  });
  document.getElementById("goExportar").addEventListener("click", function(){
    consoleEl.textContent=""; listaEl.innerHTML="";
    try {
      var cache = climaLeerCache();
      var texto = JSON.stringify(cache);
      listaEl.innerHTML = '<textarea readonly style="width:100%;height:300px;background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:10px;font-size:11px;box-sizing:border-box;" onclick="this.select()">'+texto+'</textarea>';
      log("Cache exportado: "+cache.length+" filas. Toca el cuadro de texto, selecciona todo y copia.");
    } catch(e){ log("ERROR: "+e.message); }
  });
  document.getElementById("goConclusion").addEventListener("click", function(){
    consoleEl.textContent=""; listaEl.innerHTML="";
    try {
      var cache = climaLeerCache();
      var vientoMin = Number(document.getElementById("vientoMin").value) || 0;
      if (typeof PARQUES_ORIENTACION === "undefined" || typeof getOrientacionParque !== "function") {
        log("ERROR: parques-orientacion.js no está cargado en esta página.");
        return;
      }
      var favJuegos = [], desfJuegos = [], excluidos = [];
      for (var i=0; i<cache.length; i++) {
        var g = cache[i];
        if (g.status !== "Final") continue;
        if (typeof g.total_runs !== "number") continue;
        if (g.roof === "fixed_dome") { excluidos.push(g); continue; }
        if (typeof g.wind_dir !== "number") { excluidos.push(g); continue; }
        if (typeof g.windspeed_mph === "number" && g.windspeed_mph < vientoMin) { excluidos.push(g); continue; }
        var hpACF = null;
        for (var key in PARQUES_ORIENTACION) {
          if (g.venue && (g.venue.toLowerCase().indexOf(key.toLowerCase())>=0 || key.toLowerCase().indexOf(g.venue.toLowerCase())>=0)) {
            hpACF = PARQUES_ORIENTACION[key].hpACF; break;
          }
        }
        if (hpACF === null) { excluidos.push(g); continue; }
        if (vientoFavorable(g.wind_dir, hpACF)) favJuegos.push(g);
        else desfJuegos.push(g);
      }
      function prom(arr){ if(!arr.length) return 0; var s=0; for(var i=0;i<arr.length;i++) s+=arr[i].total_runs; return (s/arr.length); }
      var promFav = prom(favJuegos), promDesf = prom(desfJuegos);
      var totalUsados = favJuegos.length + desfJuegos.length;
      var pctFav = totalUsados ? (favJuegos.length/totalUsados*100).toFixed(1) : "0.0";
      var pctDesf = totalUsados ? (desfJuegos.length/totalUsados*100).toFixed(1) : "0.0";
      var html = '<div style="margin-top:16px;padding:14px;background:#161b22;border:1px solid #30363d;border-radius:8px;">';
      html += '<div style="font-size:15px;font-weight:700;color:#e6edf3;margin-bottom:10px;">Conclusión general del cache'+(vientoMin>0?' (viento ≥ '+vientoMin+' mph)':'')+'</div>';
      html += '<div style="color:#3fb950;font-weight:600;">FAVORABLE: '+favJuegos.length+' juegos ('+pctFav+'%) · prom '+promFav.toFixed(2)+' carreras</div>';
      html += '<div style="color:#f85149;font-weight:600;margin-top:6px;">DESFAVORABLE: '+desfJuegos.length+' juegos ('+pctDesf+'%) · prom '+promDesf.toFixed(2)+' carreras</div>';
      html += '<div style="color:#8b949e;margin-top:10px;font-size:12px;">Excluidos (domo fijo, sin dato de viento, viento debajo del mínimo, o parque sin orientación confirmada): '+excluidos.length+' juegos</div>';
      html += '</div>';
      listaEl.innerHTML = html;
      log("Cálculo completo. Total usado: "+totalUsados+" de "+cache.length+" filas en cache.");
    } catch(e){ log("ERROR: "+e.message); }
  });
</script>
</body>
</html>
