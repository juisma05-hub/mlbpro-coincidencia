<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MLBPro · Coincidencia</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; }
  header { padding:14px 16px; border-bottom:1px solid #30363d; }
  h1 { font-size:17px; margin:0; }
  main { padding:16px; max-width:900px; margin:0 auto; }
  .go { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#238636; cursor:pointer; }
  .go:disabled { background:#30363d; color:#8b949e; }
  .go-venideros { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#1f6feb; cursor:pointer; margin-top:12px; }
  .go-pasados { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#d2691e; cursor:pointer; margin-top:12px; }
  .juego { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; margin-top:12px; cursor:pointer; }
  .matchup { font-size:16px; font-weight:800; }
  .estadio { font-size:13px; color:#bbb; margin:2px 0; }
  .score { font-size:22px; font-weight:800; margin-top:6px; }
  .ok{color:#32d74b;} .mid{color:#ffd60a;} .bad{color:#ff453a;}
  .ver { font-size:12px; color:#79c0ff; margin-top:6px; }
  .detalle { display:none; margin-top:10px; border-top:1px solid #30363d; padding-top:10px; }
  .detalle.abierto { display:block; }
  .hrow { font-size:12px; color:#ccc; padding:4px 0; border-bottom:1px solid #21262d; }
  .concl { text-align:center; border-top:1px solid #30363d; margin-top:10px; padding-top:10px; }
  .concl .lbl { font-size:12px; color:#8b949e; }
  .concl .val { font-size:20px; font-weight:800; color:#79c0ff; }
  .concl .sep { margin-top:8px; }
  /* --- bloque SERIE EN ESTE PARQUE (agregado) --- */
  .serieparque { margin-top:10px; border-top:1px solid #30363d; padding-top:10px; }
  .serieparque .sphdr { font-size:12px; color:#8b949e; font-weight:700; letter-spacing:0.5px; }
  .serieparque .spsub { font-size:13px; color:#bbb; margin:3px 0; }
  .serieparque .sptray { font-size:13px; font-weight:700; margin:3px 0; }
  .sp-up{color:#ff9f0a;} .sp-down{color:#64d2ff;} .sp-flat{color:#8b949e;}
  .serieparque .spsalto { font-size:12px; color:#ffd60a; margin:2px 0; }
  .serieparque .sprow { font-size:12px; color:#ccc; padding:4px 0; border-bottom:1px solid #21262d; }
  .serieparque .spprom { text-align:center; margin-top:8px; padding-top:8px; }
  .serieparque .spprom .lbl { font-size:12px; color:#8b949e; }
  .serieparque .spprom .val { font-size:20px; font-weight:800; color:#79c0ff; }
  #console { margin-top:16px; background:#010409; border:1px solid #30363d; border-radius:8px; padding:12px; min-height:60px; max-height:30vh; overflow:auto; font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
</style>
</head>
<body>
<header><h1>MLBPro · Coincidencia</h1></header>
<main>
  <button id="go" class="go">COINCIDENCIA MLBPRO</button>
  <button id="goVenideros" class="go-venideros">SERIES VENIDERAS (7 días)</button>
  <button id="goPasados" class="go-pasados">DÍAS PASADOS</button>
  <div id="lista"></div>
  <div id="console">Pulsa el botón.</div>
</main>

<script src="mlb-routes.js"></script>
<script src="estadios.js"></script>
<script src="clima-cache.js"></script>
<script src="rellenar-carreras.js"></script>
<script src="jalar-clima.js"></script>
<script src="score-match.js"></script>
<script src="calcular-coincidencia.js"></script>
<script src="jalar-condition.js"></script>
<script src="brisa-geo-parques.js"></script>
<script src="pitchers-master.js"></script>
<script src="bloques-serie.js"></script>
<script src="bloques-trayectoria.js"></script>

<script>
  var consoleEl = document.getElementById("console");
  var listaEl = document.getElementById("lista");
  function log(t){ var d=document.createElement("div"); d.textContent=t; consoleEl.appendChild(d); consoleEl.scrollTop=consoleEl.scrollHeight; }

  function hoyISO(){
    // Corte 6 AM: antes de las 6 AM se sigue mostrando el dia anterior.
    var d=new Date(Date.now() - 6*60*60*1000);
    return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
  }

  document.getElementById("goVenideros").addEventListener("click", function(){
    location.href = "venideros-test.html";
  });

  document.getElementById("goPasados").addEventListener("click", function(){
    location.href = "dia-pasado-test.html";
  });

  document.getElementById("go").addEventListener("click", async function(){
    var btn=this; btn.disabled=true; btn.textContent="TRABAJANDO…";
    consoleEl.textContent=""; listaEl.innerHTML="";
    try {
      await jalarClima(log);
      log("Trayendo juegos de hoy...");
      var hoy = hoyISO();
      var mlbUrl = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&date="+hoy+"&hydrate=probablePitcher";
      var resp = await fetch(MLB_ROUTES.WORKER_BASE + encodeURIComponent(mlbUrl));
      if(!resp.ok) throw new Error("Schedule hoy HTTP "+resp.status);
      var data = await resp.json();
      var games = (data.dates && data.dates[0]) ? data.dates[0].games : [];
      log("Juegos hoy: "+games.length);
      if(games.length===0){ log("No hay juegos hoy ("+hoy+")."); return; }

      // arma los bloques de serie UNA vez desde el cache (mismo patron que serie-pasada-test)
      var bloquesSerie = [];
      try {
        var cacheSerie = climaLeerCache();
        bloquesSerie = armarBloques(cacheSerie);
        log("Bloques de serie en cache: " + bloquesSerie.length);
      } catch(eb) {
        log("AVISO serie: " + (eb && eb.message ? eb.message : eb));
      }

      var html="";
      for(var i=0;i<games.length;i++){
        var g=games[i];
        var venue = g.venue ? g.venue.name : "";
        var away = (g.teams&&g.teams.away&&g.teams.away.team)? g.teams.away.team.name : "?";
        var home = (g.teams&&g.teams.home&&g.teams.home.team)? g.teams.home.team.name : "?";
        var pitcherAway = (g.teams&&g.teams.away&&g.teams.away.probablePitcher) ? g.teams.away.probablePitcher.fullName : "TBD";
        var pitcherHome = (g.teams&&g.teams.home&&g.teams.home.probablePitcher) ? g.teams.home.probablePitcher.fullName : "TBD";
        var pitcherAwayId = (g.teams&&g.teams.away&&g.teams.away.probablePitcher) ? g.teams.away.probablePitcher.id : null;
        var pitcherHomeId = (g.teams&&g.teams.home&&g.teams.home.probablePitcher) ? g.teams.home.probablePitcher.id : null;
        var s = STADIUM_INDEX.get(stadiumNorm(venue));
        if(!s){ html+=tarjeta(away,home,venue,null,i,null,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie); continue; }
        var w = await climaFetchWeather(s, hoy, hoy);
        var hit = w.get(climaKeyTZ(g.gameDate, s.timezone));
        if(!hit){ html+=tarjeta(away,home,venue,null,i,null,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie); continue; }
        var condHoy = await jalarCondition(g.gamePk);
        var today = {
          temperature_f: hit.temperature_f, windspeed_mph: hit.windspeed_mph,
          humidity_pct: hit.humidity_pct, precipitation_mm: hit.precipitation_mm,
          wind_dir: hit.wind_dir, venueName: venue,
          condition: condHoy
        };
        log("condition " + venue + ": " + condHoy);
        var r = calcularCoincidencia(today);
        html += tarjeta(away,home,venue,r,i,today,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie);
      }
      listaEl.innerHTML = html;
      log("LISTO.");
    } catch(e) {
      log("ERROR: " + (e && e.message ? e.message : e));
    } finally {
      btn.disabled=false; btn.textContent="COINCIDENCIA MLBPRO";
    }
  });

  // --- serie del parque: toma el bloque mas reciente del venue de hoy ---
  function serieDelParque(venue, bloquesSerie){
    if(!venue || !bloquesSerie || !bloquesSerie.length) return null;
    var v = stadiumNorm(venue);
    var candidatos = bloquesSerie.filter(function(b){
      return stadiumNorm(b.venue) === v;
    });
    if(!candidatos.length) return null;
    candidatos.sort(function(a,b){ return a.fecha_inicio < b.fecha_inicio ? 1 : -1; });
    return candidatos[0];
  }

  // --- html del bloque serie, mismo patron que serie-pasada-test.html ---
  function serieParqueHtml(venue, bloquesSerie){
    var b = serieDelParque(venue, bloquesSerie);
    if(!b){
      return '<div class="serieparque"><div class="sphdr">SERIE EN ESTE PARQUE</div>'+
             '<div class="spsub">Sin serie en cache para este parque todavía.</div></div>';
    }

    var tr = (typeof analizarTrayectoria === "function") ? analizarTrayectoria(b) : {tendencia:"ESTABLE",min:null,max:null,saltos:[]};
    var clsTend = tr.tendencia==="SUBE" ? "sp-up" : (tr.tendencia==="BAJA" ? "sp-down" : "sp-flat");
    var rango = (tr.min!==null && tr.max!==null) ? (" ("+tr.min+"° a "+tr.max+"°)") : "";
    var trayHtml = '<div class="sptray '+clsTend+'">Clima de la serie: '+tr.tendencia+rango+'</div>';

    var saltosHtml = "";
    if(tr.saltos && tr.saltos.length){
      for(var s=0;s<tr.saltos.length;s++){
        var sa = tr.saltos[s];
        saltosHtml += '<div class="spsalto">⚠️ Salto '+sa.date+': '+sa.de+'° → '+sa.a+'° ('+(sa.dif>0?"+":"")+sa.dif+'°)</div>';
      }
    }

    var filas = "";
    var sumRuns=0, nRuns=0;
    // ordena por fecha descendente (mas reciente arriba). Copia para no mutar el bloque.
    var juegosOrden = b.juegos.slice().sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
    for(var j=0;j<juegosOrden.length;j++){
      var g=juegosOrden[j];
      var ar = (g.away_runs!==undefined && g.away_runs!==null) ? g.away_runs : null;
      var hr = (g.home_runs!==undefined && g.home_runs!==null) ? g.home_runs : null;
      var carreras;
      if(ar!==null && hr!==null){
        var tot = ar+hr;
        carreras = ar+"-"+hr+" ("+tot+" carreras)";
        sumRuns += tot; nRuns++;
      } else {
        carreras = "— sin marcador";
      }
      var temp = (g.temperature_f!==undefined && g.temperature_f!==null && g.temperature_f!=="") ? g.temperature_f+"°" : "PENDIENTE";
      filas += '<div class="sprow">'+
        g.date+' · '+(g.away_team||"?")+' @ '+(g.home_team||"?")+
        ' · '+temp+
        ' · viento '+(g.windspeed_mph!==undefined?g.windspeed_mph:"?")+
        ' · hum '+(g.humidity_pct!==undefined?g.humidity_pct+"%":"?")+
        ' · '+carreras+'</div>';
    }

    var prom = "";
    if(nRuns>0){
      var promRuns = (sumRuns/nRuns).toFixed(1);
      prom = '<div class="spprom">'+
        '<div class="lbl">PROMEDIO DE CARRERAS DE LA SERIE ('+nRuns+' juegos con marcador)</div>'+
        '<div class="val">'+promRuns+'</div>'+
      '</div>';
    } else {
      prom = '<div class="spprom"><div class="lbl">Sin marcadores en esta serie.</div></div>';
    }

    return '<div class="serieparque">'+
      '<div class="sphdr">SERIE EN ESTE PARQUE</div>'+
      '<div class="spsub">'+(b.home_team||"?")+' · '+b.fecha_inicio+' a '+b.fecha_fin+' · '+b.n_juegos+' juegos</div>'+
      trayHtml +
      saltosHtml +
      filas +
      prom +
    '</div>';
  }

  function tarjeta(away,home,venue,r,idx,today,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie){
    var sc = r && r.top ? r.top.score : null;
    var cls = r ? r.cls : "bad";
    var txt = (sc===null) ? "SIN COINCIDENCIA" : (sc+"%");
      var brisaInfo = (typeof BRISA_GEO_PARQUES_MLB_2026 !== "undefined" && BRISA_GEO_PARQUES_MLB_2026[venue]) ? BRISA_GEO_PARQUES_MLB_2026[venue] : null;
      var brisaHtml = brisaInfo ? '<div class="estadio">🌬️ '+brisaInfo.variante+'</div>' : "";
      

    var climaHoy = "";
    if(today){
      climaHoy = '<div class="estadio">HOY: '+
        (today.temperature_f!==undefined?today.temperature_f+"°":"?")+
        ' · viento '+(today.windspeed_mph!==undefined?today.windspeed_mph:"?")+
        ' · dir '+(today.wind_dir!==undefined && today.wind_dir!==null && today.wind_dir!==""?today.wind_dir:"NO CONFIRMADO")+
        ' · hum '+(today.humidity_pct!==undefined?today.humidity_pct+"%":"?")+'</div>';
    }

    function xeraTxt(pid){
      if(pid===null || pid===undefined) return "";
      var p = (typeof PITCHERS_MASTER_2026 !== "undefined") ? PITCHERS_MASTER_2026[pid] : null;
      if(!p || p.xera===undefined || p.xera===null) return " (xERA NO CONFIRMADO)";
      return " (xERA "+p.xera+" general)";
    }
    var pitchers = '<div class="estadio">⚾ '+(pitcherAway||"TBD")+xeraTxt(pitcherAwayId)+' vs '+(pitcherHome||"TBD")+xeraTxt(pitcherHomeId)+'</div>';

    var det = "";
    var sumScore=0, nScore=0, sumRuns=0, nRuns=0;
    if(r && r.ranked && r.ranked.length){
      for(var j=0;j<r.ranked.length;j++){
        var h=r.ranked[j];
        var ar = (h.away_runs!==undefined && h.away_runs!==null) ? h.away_runs : null;
        var hr = (h.home_runs!==undefined && h.home_runs!==null) ? h.home_runs : null;
        var carreras;
        if(ar!==null && hr!==null){
          var tot = ar + hr;
          carreras = ar+"-"+hr+" ("+tot+" carreras)";
          sumRuns += tot; nRuns++;
        } else {
          carreras = "— sin marcador";
        }
        if(typeof h.score === "number"){ sumScore += h.score; nScore++; }
        det += '<div class="hrow">'+
          (h.date||"?")+' · '+(h.away_team||"?")+' / '+(h.home_team||"?")+
          ' · '+(h.temperature_f!==undefined?h.temperature_f+"°":"?")+
          ' · viento '+(h.windspeed_mph!==undefined?h.windspeed_mph:"?")+
          ' · hum '+(h.humidity_pct!==undefined?h.humidity_pct+"%":"?")+
          ' · score '+h.score+'%'+
          ' · '+carreras+'</div>';
      }
    } else {
      det = '<div class="hrow">Sin históricos para mostrar.</div>';
    }

    var conclusion = "";
    if(nScore>0 || nRuns>0){
      var promScore = nScore>0 ? Math.round(sumScore/nScore) : null;
      var promRuns  = nRuns>0  ? (sumRuns/nRuns).toFixed(1) : null;
      conclusion =
        '<div class="concl">'+
          '<div class="lbl">COINCIDENCIA PROMEDIO</div>'+
          '<div class="val">'+(promScore!==null?promScore+"%":"—")+'</div>'+
          '<div class="lbl sep">PROMEDIO DE CARRERAS</div>'+
          '<div class="val">'+(promRuns!==null?promRuns:"—")+'</div>'+
        '</div>';
    }

    var serieHtml = serieParqueHtml(venue, bloquesSerie);

    return '<div class="juego" onclick="toggleDet('+idx+')">'+
      '<div class="matchup">'+away+' @ '+home+'</div>'+
      '<div class="estadio">'+(venue||"SIN PARQUE")+'</div>'+
      climaHoy +
              brisaHtml +

      pitchers +
      '<div class="score '+cls+'">Coincidencia: '+txt+'</div>'+
      serieHtml +
      '<div class="ver">Toca para ver los 5 parecidos ▼</div>'+
      '<div class="detalle" id="det'+idx+'">'+det+conclusion+'</div>'+
      '</div>';
  }

  function toggleDet(idx){
    var d=document.getElementById("det"+idx);
    if(d){ d.classList.toggle("abierto"); }
  }
</script>
</body>
</html>
