<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>DataPro · Coincidencia</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; }
  header { padding:14px 16px; border-bottom:1px solid #30363d; }
  h1 { font-size:17px; margin:0; }
  main { padding:16px; max-width:900px; margin:0 auto; }
  .go { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#238636; cursor:pointer; }
  .go:disabled { background:#30363d; color:#8b949e; }
  .go .sub2 { display:block; font-size:11px; font-weight:600; opacity:0.85; margin-top:3px; }
  button .sub2 { display:block; font-size:11px; font-weight:600; opacity:0.85; margin-top:3px; }
  .go-venideros { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#1f6feb; cursor:pointer; margin-top:12px; pointer-events:auto !important; opacity:1 !important; }
  .go-pasados { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#d2691e; cursor:pointer; margin-top:12px; pointer-events:auto !important; opacity:1 !important; }
  .go-hunter { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#8957e5; cursor:pointer; margin-top:12px; }
  .go-auditoria { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#da3633; cursor:pointer; margin-top:12px; }
  .go-k6 { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#5b3da8; cursor:pointer; margin-top:12px; }
  .go-brujula { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#0d1117; background:linear-gradient(180deg,#7ee8e0,#1f9e93); cursor:pointer; margin-bottom:12px; }
  .go-brujula .sub2 { display:block; font-size:11px; font-weight:600; opacity:0.8; margin-top:3px; }

  .juego { background:#161b22; border:1px solid #30363d; border-radius:14px; padding:16px; margin-top:14px; }

  .juego-cab { cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .juego-cab .chev { color:#8b949e; font-size:14px; transition:transform 0.2s; flex-shrink:0; }
  .juego-cab.abierto .chev { transform:rotate(90deg); }
  .juego-cab .coin-mini { font-size:16px; font-weight:800; padding:5px 12px; border-radius:8px; flex-shrink:0; }
  .juego-cab .coin-mini.ok  { color:#3fb950; background:#0d2818; }
  .juego-cab .coin-mini.mid { color:#ffd60a; background:#2d2408; }
  .juego-cab .coin-mini.bad { color:#ff453a; background:#2d0d0d; }
  .juego-cuerpo { display:none; margin-top:14px; }
  .juego-cuerpo.abierto { display:block; }

  .matchup { font-size:18px; font-weight:800; }
  .estadio { font-size:13px; color:#8b949e; margin:3px 0; }
  .hoychips { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
  .chip { font-size:12px; background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:4px 9px; color:#c9d1d9; }
  .chip b { color:#fff; }
  .brisachip { border-color:#3a4250; }
  .panel { display:flex; gap:8px; margin:12px 0 4px; }
  .pbox { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:10px; padding:10px; text-align:center; }
  .pbox .lbl { font-size:10px; color:#8b949e; letter-spacing:0.3px; }
  .pbox .val { font-size:23px; font-weight:800; margin-top:2px; }
  .v-coin { color:#3fb950; } .v-run { color:#79c0ff; }
  .v-coin.mid{color:#ffd60a;} .v-coin.bad{color:#ff453a;}
  .lineas { display:flex; gap:8px; margin:8px 0 2px; }
  .lbox { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:10px; padding:10px; text-align:center; }
  .lbox .lbl { font-size:10px; color:#8b949e; letter-spacing:0.3px; }
  .lbox .val { font-size:20px; font-weight:800; margin-top:2px; color:#79c0ff; }
  .lbox.mercado { border-style:dashed; }
  .lbox.mercado .val { font-size:20px; color:#ffd60a; font-weight:800; }

  details.fold > summary { font-size:13px; color:#79c0ff; font-weight:700; cursor:pointer; list-style:none; padding:6px 0; }
  details.fold > summary::-webkit-details-marker { display:none; }
  details.fold > summary::before { content:"\25B6  "; font-size:11px; }
  details.fold[open] > summary::before { content:"\25BC  "; }

  .brujula-explorer-wrap { text-align:center; padding:10px 0 6px; margin:6px 0; border-bottom:1px solid #21262d; touch-action:none; cursor:grab; }

  .explorer-txt { font-size:12px; color:#8b949e; margin-top:3px; }
  .explorer-txt b { color:#58a6ff; }
  .viento-va-chip { display:inline-block; background:#ff2222; color:#fff; font-weight:800; font-size:15px; padding:6px 18px; border-radius:8px; margin-top:6px; letter-spacing:0.5px; }
  .viento-va-chip .flecha { font-size:16px; margin:0 4px; }
  .explorer-hint { font-size:10px; color:#6e7681; margin-top:6px; font-style:italic; }

  #portada {
    position:fixed; inset:0; z-index:9999;
    background: linear-gradient(180deg, #030303 0%, #0A0908 45%, #11100E 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:50px 24px;
  }
  #portada::before, #portada::after {
    content:""; position:absolute; width:60px; height:60px; border:1px solid #4A3212;
  }

  #portada::after  { top:24px; right:24px; border-left:0; border-bottom:0; }
  .p-sub { font-size:11px; letter-spacing:5px; color:#A9782D; margin-bottom:6px; text-transform:uppercase; }
  .p-tri { width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-top:7px solid #A9782D; margin-bottom:30px; }
  .p-logo { width:200px; height:200px; margin-bottom:24px; }
  .p-titulo { font-size:36px; font-weight:900; letter-spacing:3px; margin:8px 0; font-family:'Arial Black',Impact,sans-serif;
    background: linear-gradient(180deg, #FFF0B0 0%, #F6D77A 20%, #C9953A 45%, #6F4B1C 75%, #E4B85A 100%);

    font-family:-apple-system,sans-serif;

  #appContenido { display:none; }
</style>

<script>
  var consoleEl = document.getElementById("console");
  var listaEl = document.getElementById("lista");
  function log(t){ var d=document.createElement("div"); d.textContent=t; consoleEl.appendChild(d); consoleEl.scrollTop=consoleEl.scrollHeight; }

  function hoyISO(){
    var d=new Date(Date.now()-6*60*60*1000);
    return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
  }

  var MESES_CORTOS={"01":"Ene","02":"Feb","03":"Mar","04":"Abr","05":"May","06":"Jun","07":"Jul","08":"Ago","09":"Sep","10":"Oct","11":"Nov","12":"Dic"};
  function fechaBonita(date){
    if(!date||typeof date!=="string"||date.length<10) return date||"?";
    var yy=date.slice(0,4),mm=date.slice(5,7),dd=date.slice(8,10);
    return dd+" "+(MESES_CORTOS[mm]||mm)+" "+yy.slice(2);
  }

  function horaBonita(gameDateISO){
    if(!gameDateISO) return "";
    try {
      var d = new Date(gameDateISO);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleTimeString('es', {hour:'numeric', minute:'2-digit', hour12:true});
    } catch(e) { return ""; }
  }

  document.getElementById("goBrujula").addEventListener("click",function(){ location.href="casar-series-test.html"; });
  document.getElementById("goMedirOrientacion").addEventListener("click",function(){ location.href="medir-orientacion.html"; });
  document.getElementById("goTorearPonches").addEventListener("click",function(){ location.href="torear-ponches-test.html"; });
  document.getElementById("goVenideros").addEventListener("click",function(){ location.href="venideros-test.html"; });
  document.getElementById("goPasados").addEventListener("click",function(){ location.href="dia-pasado-test.html"; });
  document.getElementById("goHunter").addEventListener("click",function(){ location.href="dataprohunter.html"; });
  document.getElementById("goAuditoria").addEventListener("click",function(){ location.href="auditoria.html"; });
  document.getElementById("goK6").addEventListener("click",function(){ location.href="k6-test.html"; });

  function toggleJuego(idx){
    var cab = document.getElementById('cab_'+idx);
    var cuerpo = document.getElementById('cuerpo_'+idx);
    if(!cab || !cuerpo) return;
    var abierto = cuerpo.classList.toggle('abierto');
    cab.classList.toggle('abierto', abierto);
  }

  // FASE B (arreglo previo):
  // 1) El parque ahora rota por 'hp' DIRECTO, sin sumarle 180 — el +180
  //    de mas quedaba corrido, no calzaba con el anillo fijo. Confirmado
  //    contra k6-test.html, que nunca tuvo ese +180.
  // 2) La flecha del viento vuelve a apuntar hacia VA_HACIA (hacia donde
  //    va el viento), no vieneDe. Es la convencion original de toda esta
  //    sesion (bug fijo #1 del checkpoint madre) — esta version la habia
  //    revertido sin querer a vieneDe. Vuelve a coincidir con k6-test.html.
  function svgBrujulaJuego(idx, venue, hpACF, hoyDir, hoyVel){
    var cx=100, cy=100;
    var venueEsc0 = String(venue||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    if (hpACF===null || hpACF===undefined) {
      return '<div class="brujula-explorer-wrap" data-idx="'+idx+'" data-venue="'+venueEsc0+'" data-hp="0">'+
        '<svg viewBox="0 0 200 205">'+
          '<circle cx="'+cx+'" cy="'+cy+'" r="95" fill="none" stroke="#333" stroke-width="1"/>'+
          '<text x="'+cx+'" y="'+cy+'" fill="#8b949e" font-size="13" font-weight="700" text-anchor="middle">NO_CONFIRMADO</text>'+
        '</svg>'+
        '<div class="explorer-txt">'+venueEsc0+' · orientación de parque sin medir</div>'+
      '</div>';
    }
    var hp = hpACF;
    var puntos16=[
      {g:0,t:"N"},{g:22.5,t:"NNE"},{g:45,t:"NE"},{g:67.5,t:"ENE"},
      {g:90,t:"E"},{g:112.5,t:"ESE"},{g:135,t:"SE"},{g:157.5,t:"SSE"},
      {g:180,t:"S"},{g:202.5,t:"SSW"},{g:225,t:"SW"},{g:247.5,t:"WSW"},
      {g:270,t:"W"},{g:292.5,t:"WNW"},{g:315,t:"NW"},{g:337.5,t:"NNW"}
    ];
    var cardHtml="", degHtml="";
    puntos16.forEach(function(p){
      var gAjustado = p.g;
      cardHtml+='<g transform="rotate('+gAjustado+' '+cx+' '+cy+')"><text x="'+cx+'" y="14" font-size="9" font-weight="700" fill="#9b59ff" text-anchor="middle">'+p.t+'</text></g>';
      degHtml+='<g transform="rotate('+gAjustado+' '+cx+' '+cy+')"><text x="'+cx+'" y="38" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">'+Math.round(p.g)+'°</text></g>';
    });

    var hoyFlechaHtml = "";
    var hoyTxt = "N/C";
    var hoyVaTxt = null;
    if (hoyDir !== null && hoyDir !== undefined && hoyDir !== "" && !isNaN(Number(hoyDir))) {
      var vieneDe = ((Number(hoyDir)%360)+360)%360;
      var vaHacia = (vieneDe+180)%360;
      hoyFlechaHtml =
        '<g transform="rotate('+vaHacia+' '+cx+' '+cy+')">'+
          '<line x1="'+cx+'" y1="'+(cy+25)+'" x2="'+cx+'" y2="'+(cy-19)+'" stroke="#ff2222" stroke-width="2" stroke-linecap="round"/>'+
          '<polygon points="'+cx+','+(cy-23)+' '+(cx-6)+','+(cy-9)+' '+(cx+6)+','+(cy-9)+'" fill="#ff2222"/>'+
          '<circle cx="'+cx+'" cy="'+(cy+25)+'" r="6" fill="#ff2222" stroke="#fff" stroke-width="1.5"/>'+
        '</g>';
      hoyTxt = Math.round(vieneDe)+"°";
      hoyVaTxt = Math.round(vaHacia)+"°";
    }

    var venueEsc = venueEsc0;

    return '<div class="brujula-explorer-wrap" data-idx="'+idx+'" data-venue="'+venueEsc+'" data-hp="'+hp+'">'+
      '<svg viewBox="0 0 200 205">'+
        '<circle cx="'+cx+'" cy="'+cy+'" r="95" fill="none" stroke="#333" stroke-width="1"/>'+
        '<circle cx="'+cx+'" cy="'+cy+'" r="68" fill="none" stroke="#333" stroke-width="1"/>'+
        '<circle cx="'+cx+'" cy="'+cy+'" r="66" fill="#0e1420" stroke="#222" stroke-width="1"/>'+
        cardHtml + degHtml +
        '<g transform="rotate('+(((hp%360)+360)%360)+' '+cx+' '+cy+')">'+

  function carrerasDeHist(g){
    var ar=g.away_runs, hr=g.home_runs;
    if(ar!==null&&ar!==undefined&&hr!==null&&hr!==undefined) return Number(ar)+Number(hr);
    return null;
  }

  // FIX 5 jul 2026: venueReal ya NO traduce con STADIUM_ALIAS_2026.
  // Ese alias existe para que jalar-clima.js encuentre las coordenadas
  // fijas ("Dodger Stadium") en STADIUM_INDEX — sirve para el clima de HOY.
  // Pero el cache historico (climaLeerCache) guarda el venue TAL CUAL
  // lo devuelve la MLB API ("UNIQLO Field at Dodger Stadium"), igual
  // para juegos de hoy y de marzo, porque la API no versiona el nombre
  // por fecha. Al traducir venueReal al nombre viejo, la comparacion
  // g.venue===venueReal nunca hacia match contra el cache -> por eso
  // salia siempre "sin juegos en cache para este rango".
  function actualizarExplorer(wrap, deg){
    var idx = wrap.getAttribute('data-idx');
    var venue = wrap.getAttribute('data-venue');
    var venueReal = venue;
    var degReal = ((deg%360)+360)%360;
    var lo = Math.floor(degReal/30)*30, hi = lo+30;
    var arrow = document.getElementById('explorerArrow_'+idx);
    if(arrow) arrow.setAttribute('transform','rotate('+deg+' 100 100)');
    var rangoEl = document.getElementById('explorerRango_'+idx);
    if(rangoEl) rangoEl.textContent = lo+'°–'+hi+'°';
    var carrEl = document.getElementById('explorerCarr_'+idx);
    try{
      var cache = climaLeerCache();
      var juegos = cache.filter(function(g){
        return g && g.venue===venueReal && g.wind_dir!==undefined && g.wind_dir!==null && g.wind_dir!=="" &&
               !isNaN(Number(g.wind_dir)) && (Number(g.wind_dir)%360)>=lo && (Number(g.wind_dir)%360)<hi;
      });
      var carreras=[], vels=[];
      juegos.forEach(function(g){
        var c=carrerasDeHist(g); if(c!==null) carreras.push(c);
        if(typeof g.windspeed_mph==="number") vels.push(g.windspeed_mph);
      });
      var prom = carreras.length ? (carreras.reduce(function(a,b){return a+b;},0)/carreras.length) : null;
      var promV = vels.length ? (vels.reduce(function(a,b){return a+b;},0)/vels.length) : null;
      if(carrEl){
        carrEl.textContent = juegos.length
          ? prom.toFixed(1)+' carreras prom. ('+juegos.length+' juego(s)'+(promV!==null?' · '+promV.toFixed(1)+' mph avg':'')+')'
          : 'sin juegos en cache para este rango';
      }
    }catch(e){ if(carrEl) carrEl.textContent='ERROR: '+e.message; }
  }

  function clienteASvgPoint(svg, clientX, clientY){
    var pt = svg.createSVGPoint();
    pt.x=clientX; pt.y=clientY;
    var ctm = svg.getScreenCTM();
    if(!ctm) return {x:100,y:100};
    return pt.matrixTransform(ctm.inverse());
  }

  function degDesdeEvento(wrap, clientX, clientY){
    var svg = wrap.querySelector('svg');
    var p = clienteASvgPoint(svg, clientX, clientY);
    var dx = p.x-100, dy = p.y-100;
    var deg = Math.atan2(dx, -dy)*180/Math.PI;
    if(deg<0) deg+=360;
    return deg;
  }

  function serieDelParque(venue,bloquesSerie){
    if(!venue||!bloquesSerie||!bloquesSerie.length) return null;
    var v=stadiumNorm(venue);
    var candidatos=bloquesSerie.filter(function(b){ return stadiumNorm(b.venue)===v; });
    if(!candidatos.length) return null;
    candidatos.sort(function(a,b){ return a.fecha_inicio<b.fecha_inicio?1:-1; });
    return candidatos[0];
  }

  function agruparEnSeries(lista){
    var arr=lista.slice().filter(function(x){ return x&&x.date; });
    arr.sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:0); });
    function diffDias(d1,d2){ var a=new Date(d1+"T00:00:00"),b=new Date(d2+"T00:00:00"); return Math.round((b-a)/86400000); }
    var series=[],actual=null;
    for(var i=0;i<arr.length;i++){
      var g=arr[i];
      if(actual&&g.home_team===actual.home_team&&diffDias(actual.ultima,g.date)<=2){ actual.juegos.push(g); actual.ultima=g.date; }
      else{ actual={home_team:g.home_team,away_team:g.away_team,primera:g.date,ultima:g.date,juegos:[g]}; series.push(actual); }
    }
    return series;
  }

      var vientoChip='<span class="chip">🌬️ <b>'+(g.windspeed_mph!==undefined?g.windspeed_mph:"?")+'</b></span>';

  function tarjeta(away,home,venue,horaTxt,r,idx,today,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie,rosterMap,catcherAwayId,catcherHomeId,umpireHomeHoy,lineaMercado,factorH){

      hoychips='<div class="hoychips"><span class="chip brisachip">🌬️ '+brisaInfo.variante+'</span></div>';

    var promScore=nScore>0?Math.round(sumScore/nScore):null;

    var lineas='<div class="lineas">'+

      '<div class="lbox fh"><div class="lbl">LÍNEA F.H.</div><div class="'+fhClass+'">'+fhVal+'</div><div class="sub">'+fhSub+'</div></div>'+
      '<div class="lbox mercado"><div class="lbl">LÍNEA MERCADO</div><div class="'+mercadoClass+'">'+mercadoVal+'</div></div>'+
    '</div>';

    function xeraTxt(pid){
      if(pid===null||pid===undefined) return "";
      var p=(typeof PITCHERS_MASTER_2026!=="undefined")?PITCHERS_MASTER_2026[pid]:null;
      if(!p||p.xera===undefined||p.xera===null) return " (xERA NO_CONFIRMADO)";
      return " (xERA "+p.xera+" general)";
    }
    var pitchersHoy='⚾ '+(pitcherAway||"TBD")+xeraTxt(pitcherAwayId)+' vs '+(pitcherHome||"TBD")+xeraTxt(pitcherHomeId);
    var ca=traducirCatcher(catcherAwayId),ch=traducirCatcher(catcherHomeId);
    function rvTxt(rv){ if(rv===undefined||rv===null||rv==="NO_CONFIRMADO") return " (rv_tot NO_CONFIRMADO)"; return " (rv_tot "+rv+")"; }
    var catchersHoy='🧤 '+ca.nombre+rvTxt(ca.rv_tot)+' vs '+ch.nombre+rvTxt(ch.rv_tot);
    var uHoy=traducirUmpire(umpireHomeHoy);
    var umpireHoy='🧑‍⚖️ Umpire de plato: '+umpireTxt(uHoy);
    var foldHoy='<details class="fold"><summary>Pitcher / Catcher / Umpire de hoy</summary>'+
      '<div class="sub">'+
        '<div class="hrow" style="border:0;padding:3px 0;">'+pitchersHoy+'</div>'+
        '<div class="hrow" style="border:0;padding:3px 0;">'+catchersHoy+'</div>'+
        '<div class="hrow" style="border:0;padding:3px 0;">'+umpireHoy+'</div>'+
      '</div></details>';
    var det5="";
    if(r&&r.ranked&&r.ranked.length){
      var series=agruparEnSeries(r.ranked);
      series.sort(function(a,b){ return a.ultima<b.ultima?1:(a.ultima>b.ultima?-1:0); });
      for(var sx=0;sx<series.length;sx++){
        var serie=series[sx];
        det5+='<div class="serie-hdr">SERIE · '+(serie.home_team||"?")+' · '+serie.primera+' a '+serie.ultima+' · '+serie.juegos.length+' juego(s)</div>';
        var js=serie.juegos.slice().sort(function(a,b){ return a.date<b.date?1:(a.date>b.date?-1:0); });
        for(var jj=0;jj<js.length;jj++){
          var h=js[jj];
          var arr2=(h.away_runs!==undefined&&h.away_runs!==null)?h.away_runs:null;
          var hrr2=(h.home_runs!==undefined&&h.home_runs!==null)?h.home_runs:null;
          var carrChip2;
          if(arr2!==null&&hrr2!==null){ var t2=arr2+hrr2; carrChip2='<span class="chip">⚾ <b>'+arr2+'-'+hrr2+'</b> ('+t2+')</span>'; }
          else{ carrChip2='<span class="chip">⚾ sin marcador</span>'; }
          det5+='<div class="sub">'+
            '<div class="top"><span class="fecha">'+fechaBonita(h.date)+'</span> · '+(h.away_team||"?")+' / '+(h.home_team||"?")+'</div>'+
            '<div class="nums">'+
              '<span class="chip">🌡️ <b>'+(h.temperature_f!==undefined?h.temperature_f+"°":"?")+'</b></span>'+
              '<span class="chip">🌬️ <b>'+(h.windspeed_mph!==undefined?h.windspeed_mph:"?")+'</b></span>'+
              '<span class="chip">🧭 dir <b>'+(h.wind_dir!==undefined&&h.wind_dir!==null&&h.wind_dir!==""?h.wind_dir:"N/C")+'</b></span>'+
              '<span class="chip">💧 <b>'+(h.humidity_pct!==undefined?h.humidity_pct+"%":"?")+'</b></span>'+
              '<span class="chip">score <b>'+h.score+'%</b></span>'+
              carrChip2+
            '</div></div>';
        }
      }
    }else{ det5='<div class="sub">Sin históricos para mostrar.</div>'; }
    var fold5='<details class="fold"><summary>Clima en este parque (5 juegos parecidos)</summary><div class="serieparque">'+det5+'</div></details>';

    var serieHtml='<details class="fold"><summary>Serie en este parque (por si ya jugaron en escena parecida)</summary>'+serieParqueHtml(venue,bloquesSerie,rosterMap)+'</details>';

    var hpACFCard = (venue && typeof getOrientacionParque==="function") ? getOrientacionParque(venue) : null;
    var brujulaHoy = venue ? svgBrujulaJuego(idx, venue, hpACFCard, today?today.wind_dir:null, today?today.windspeed_mph:null) : '';

    return '<div class="juego">'+
      '<div class="juego-cab" id="cab_'+idx+'" onclick="toggleJuego('+idx+')">'+
        '<div><div class="matchup">'+away+' @ '+home+'</div><div class="estadio">'+(venue||"SIN PARQUE")+(horaTxt?' · '+horaTxt:'')+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:8px;">'+
          '<span class="coin-mini '+cls+'">'+coinTxt+'</span>'+
          '<span class="chev">▶</span>'+
        '</div>'+
      '</div>'+
      '<div class="juego-cuerpo" id="cuerpo_'+idx+'">'+
        hoychips+
        panel+lineas+
        brujulaHoy+
        fold5+
        serieHtml+
        foldHoy+
      '</div>'+
    '</div>';
  }
</script>
<script>
  function entrarApp(){
    document.getElementById("portada").style.display = "none";
    document.getElementById("appContenido").style.display = "block";
    try { sessionStorage.setItem("mlbpro_ya_entro", "1"); } catch(e){}
  }
  document.getElementById("btnEntrar").addEventListener("click", entrarApp);
  try {
    if (sessionStorage.getItem("mlbpro_ya_entro") === "1") entrarApp();
  } catch(e){}
</script>
</div>
</body>
</html>
