<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>DataPro · Coincidencia</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; }
  header { padding:14px 16px; border-bottom:1px solid #30363d; }
  h1 { font-size:17px; margin:0; }
  main { padding:16px; max-width:900px; margin:0 auto; }
  .go { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#238636; cursor:pointer; }
  .go:disabled { background:#30363d; color:#8b949e; }
  .go-venideros { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#1f6feb; cursor:pointer; margin-top:12px; }
  .go-pasados { width:100%; border:0; border-radius:10px; padding:18px; font-size:17px; font-weight:800; color:#fff; background:#d2691e; cursor:pointer; margin-top:12px; }

  .juego { background:#161b22; border:1px solid #30363d; border-radius:14px; padding:16px; margin-top:14px; }
  .matchup { font-size:18px; font-weight:800; }
  .estadio { font-size:13px; color:#8b949e; margin:3px 0; }

  .hoychips { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
  .chip { font-size:12px; background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:4px 9px; color:#c9d1d9; }
  .chip b { color:#fff; }
  .brisachip { border-color:#3a4250; }

  .panel { display:flex; gap:8px; margin:12px 0 4px; }
  .pbox { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:10px; padding:10px; text-align:center; }
  .pbox .lbl { font-size:10px; color:#8b949e; letter-spacing:0.3px; }
  .pbox .val { font-size:23px; font-weight:800; margin-top:2px; }
  .v-coin { color:#3fb950; }
  .v-run  { color:#79c0ff; }
  .v-coin.mid{color:#ffd60a;} .v-coin.bad{color:#ff453a;}

  .lineas { display:flex; gap:8px; margin:8px 0 2px; }
  .lbox { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:10px; padding:10px; text-align:center; }
  .lbox .lbl { font-size:10px; color:#8b949e; letter-spacing:0.3px; }
  .lbox .val { font-size:20px; font-weight:800; margin-top:2px; color:#79c0ff; }
  .lbox.mercado { border-style:dashed; }
  .lbox.mercado .val { font-size:20px; color:#ffd60a; font-weight:800; }
  .lbox.mercado .val.pendiente { font-size:13px; color:#8b949e; font-weight:700; }

  details.fold { margin-top:10px; border-top:1px solid #30363d; padding-top:8px; }
  details.fold > summary { font-size:13px; color:#79c0ff; font-weight:700; cursor:pointer; list-style:none; padding:6px 0; }
  details.fold > summary::-webkit-details-marker { display:none; }
  details.fold > summary::before { content:"\25B6  "; font-size:11px; }
  details.fold[open] > summary::before { content:"\25BC  "; }

  .sub { background:#0d1117; border:1px solid #21262d; border-radius:8px; padding:10px; margin:8px 0; }
  .sub .top { font-size:13px; font-weight:700; margin-bottom:6px; }
  .sub .fecha { color:#79c0ff; }
  .sub .nums { display:flex; flex-wrap:wrap; gap:5px; }
  .serie-hdr { font-size:11px; color:#8b949e; font-weight:700; letter-spacing:0.5px; margin:10px 0 4px; }

  .serieparque { margin-top:12px; border-top:1px solid #30363d; padding-top:10px; }
  .serieparque .sphdr { font-size:12px; color:#8b949e; font-weight:700; letter-spacing:0.5px; }
  .serieparque .spsub { font-size:13px; color:#bbb; margin:3px 0; }
  .serieparque .sptray { font-size:13px; font-weight:700; margin:3px 0; }
  .sp-up{color:#ff9f0a;} .sp-down{color:#64d2ff;} .sp-flat{color:#8b949e;}
  .serieparque .spsalto { font-size:12px; color:#ffd60a; margin:2px 0; }
  .serieparque .spprom { text-align:center; margin-top:8px; padding-top:8px; }
  .serieparque .spprom .lbl { font-size:12px; color:#8b949e; }
  .serieparque .spprom .val { font-size:20px; font-weight:800; color:#79c0ff; }

  #console { margin-top:16px; background:#010409; border:1px solid #30363d; border-radius:8px; padding:12px; min-height:60px; max-height:30vh; overflow:auto; font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
</style>
</head>
<body>
<header><h1>DataPro · Coincidencia</h1></header>
<main>
  <button id="go" class="go">COINCIDENCIA DATAPRO</button>
  <button id="goVenideros" class="go-venideros">SERIES VENIDERAS (7 días)</button>
  <button id="goPasados" class="go-pasados">DÍAS PASADOS</button>
  <div id="lista"></div>
  <div id="console">Pulsa el botón.</div>
</main>

<script src="mlb-routes.js"></script>
<script src="estadios.js"></script>
<script src="clima-cache.js"></script>
<script src="rellenar-carreras.js"></script>
<script src="jalar-clima.js"></script>
<script src="score-match.js"></script>
<script src="calcular-coincidencia.js"></script>
<script src="jalar-condition.js"></script>
<script src="brisa-geo-parques.js"></script>
<script src="pitchers-master.js"></script>
<script src="jalar-roster.js"></script>
<script src="traducir-pitcher.js"></script>
<script src="catchers-master.js"></script>
<script src="traducir-catcher.js"></script>
<script src="umpires-master.js"></script>
<script src="traducir-umpire.js"></script>
<script src="bloques-serie.js"></script>
<script src="bloques-trayectoria.js"></script>
<script src="jalar-linea.js"></script>

<script>
  var consoleEl = document.getElementById("console");
  var listaEl = document.getElementById("lista");
  function log(t){ var d=document.createElement("div"); d.textContent=t; consoleEl.appendChild(d); consoleEl.scrollTop=consoleEl.scrollHeight; }

  function hoyISO(){
    var d=new Date(Date.now() - 6*60*60*1000);
    return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
  }

  var MESES_CORTOS = {"01":"Ene","02":"Feb","03":"Mar","04":"Abr","05":"May","06":"Jun","07":"Jul","08":"Ago","09":"Sep","10":"Oct","11":"Nov","12":"Dic"};
  function fechaBonita(date){
    if(!date || typeof date!=="string" || date.length<10) return date||"?";
    var yy=date.slice(0,4), mm=date.slice(5,7), dd=date.slice(8,10);
    var mes=MESES_CORTOS[mm]||mm;
    return dd+" "+mes+" "+yy.slice(2);
  }

  document.getElementById("goVenideros").addEventListener("click", function(){
    location.href = "venideros-test.html";
  });
  document.getElementById("goPasados").addEventListener("click", function(){
    location.href = "dia-pasado-test.html";
  });

  // cache de lineas para esta sesion
  var lineasCache = null;

  document.getElementById("go").addEventListener("click", async function(){
    var btn=this; btn.disabled=true; btn.textContent="TRABAJANDO…";
    consoleEl.textContent=""; listaEl.innerHTML="";
    try {
      await jalarClima(log);

      // Jalar líneas de mercado
      try {
        lineasCache = await jalarLineas(log);
      } catch(el) {
        log("AVISO líneas: " + (el && el.message ? el.message : el));
        lineasCache = null;
      }

      log("Trayendo juegos de hoy...");
      var hoy = hoyISO();
      var mlbUrl = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&date="+hoy+"&hydrate=probablePitcher";
      var resp = await fetch(MLB_ROUTES.WORKER_BASE + encodeURIComponent(mlbUrl));
      if(!resp.ok) throw new Error("Schedule hoy HTTP "+resp.status);
      var data = await resp.json();
      var games = (data.dates && data.dates[0]) ? data.dates[0].games : [];
      log("Juegos hoy: "+games.length);
      if(games.length===0){ log("No hay juegos hoy ("+hoy+")."); return; }

      var bloquesSerie = [];
      try {
        var cacheSerie = climaLeerCache();
        bloquesSerie = armarBloques(cacheSerie);
        log("Bloques de serie en cache: " + bloquesSerie.length);
      } catch(eb) {
        log("AVISO serie: " + (eb && eb.message ? eb.message : eb));
      }

      var rosterMap = {};
      try {
        var idsAPrecargar = [];
        for (var iv=0; iv<games.length; iv++){
          var gv = games[iv];
          var venueV = gv.venue ? gv.venue.name : "";
          var bloqueV = serieDelParque(venueV, bloquesSerie);
          if(bloqueV && bloqueV.juegos){
            for(var jv=0; jv<bloqueV.juegos.length; jv++){
              var gj = bloqueV.juegos[jv];
              if(gj.game_id && idsAPrecargar.indexOf(gj.game_id) === -1){
                idsAPrecargar.push(gj.game_id);
              }
            }
          }
        }
        log("Precargando roster de "+idsAPrecargar.length+" juego(s) de series...");
        var rosters = await Promise.all(idsAPrecargar.map(function(id){ return jalarRoster(id); }));
        for(var ir=0; ir<rosters.length; ir++){
          rosterMap[rosters[ir].game_id] = rosters[ir];
        }
      } catch(er) {
        log("AVISO roster series: " + (er && er.message ? er.message : er));
      }

      var html="";
      for(var i=0;i<games.length;i++){
        var g=games[i];
        var venue = g.venue ? g.venue.name : "";
        var away = (g.teams&&g.teams.away&&g.teams.away.team)? g.teams.away.team.name : "?";
        var home = (g.teams&&g.teams.home&&g.teams.home.team)? g.teams.home.team.name : "?";
        var pitcherAway = (g.teams&&g.teams.away&&g.teams.away.probablePitcher) ? g.teams.away.probablePitcher.fullName : "TBD";
        var pitcherHome = (g.teams&&g.teams.home&&g.teams.home.probablePitcher) ? g.teams.home.probablePitcher.fullName : "TBD";
        var pitcherAwayId = (g.teams&&g.teams.away&&g.teams.away.probablePitcher) ? g.teams.away.probablePitcher.id : null;
        var pitcherHomeId = (g.teams&&g.teams.home&&g.teams.home.probablePitcher) ? g.teams.home.probablePitcher.id : null;

        var rosterHoy = await jalarRoster(g.gamePk);
        var catcherAwayId = rosterHoy ? rosterHoy.catcher_away_id : "NO_CONFIRMADO";
        var catcherHomeId = rosterHoy ? rosterHoy.catcher_home_id : "NO_CONFIRMADO";
        var umpireHomeHoy = rosterHoy ? rosterHoy.umpire_home : "NO_CONFIRMADO";

        // buscar línea de mercado para este juego
        var lineaMercado = lineasCache ? lineasBuscarJuego(home, away) : null;

        var s = STADIUM_INDEX.get(stadiumNorm(venue));
        if(!s){ html+=tarjeta(away,home,venue,null,i,null,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie,rosterMap,catcherAwayId,catcherHomeId,umpireHomeHoy,lineaMercado); continue; }
        var w = await climaFetchWeather(s, hoy, hoy);
        var hit = w.get(climaKeyTZ(g.gameDate, s.timezone));
        if(!hit){ html+=tarjeta(away,home,venue,null,i,null,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie,rosterMap,catcherAwayId,catcherHomeId,umpireHomeHoy,lineaMercado); continue; }
        var condHoy = await jalarCondition(g.gamePk);
        var today = {
          temperature_f: hit.temperature_f, windspeed_mph: hit.windspeed_mph,
          humidity_pct: hit.humidity_pct, precipitation_mm: hit.precipitation_mm,
          wind_dir: hit.wind_dir, venueName: venue,
          condition: condHoy
        };
        log("condition " + venue + ": " + condHoy);
        var r = calcularCoincidencia(today);
        html += tarjeta(away,home,venue,r,i,today,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie,rosterMap,catcherAwayId,catcherHomeId,umpireHomeHoy,lineaMercado);
      }
      listaEl.innerHTML = html;
      log("LISTO.");
    } catch(e) {
      log("ERROR: " + (e && e.message ? e.message : e));
    } finally {
      btn.disabled=false; btn.textContent="COINCIDENCIA DATAPRO";
    }
  });

  function serieDelParque(venue, bloquesSerie){
    if(!venue || !bloquesSerie || !bloquesSerie.length) return null;
    var v = stadiumNorm(venue);
    var candidatos = bloquesSerie.filter(function(b){ return stadiumNorm(b.venue) === v; });
    if(!candidatos.length) return null;
    candidatos.sort(function(a,b){ return a.fecha_inicio < b.fecha_inicio ? 1 : -1; });
    return candidatos[0];
  }

  function agruparEnSeries(lista){
    var arr = lista.slice().filter(function(x){ return x && x.date; });
    arr.sort(function(a,b){ return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });
    function diffDias(d1,d2){
      var a=new Date(d1+"T00:00:00"), b=new Date(d2+"T00:00:00");
      return Math.round((b-a)/86400000);
    }
    var series=[], actual=null;
    for(var i=0;i<arr.length;i++){
      var g=arr[i];
      if(actual && g.home_team===actual.home_team && diffDias(actual.ultima, g.date) <= 2){
        actual.juegos.push(g); actual.ultima=g.date;
      } else {
        actual={ home_team:g.home_team, away_team:g.away_team, primera:g.date, ultima:g.date, juegos:[g] };
        series.push(actual);
      }
    }
    return series;
  }

  function umpireTxt(u){
    if(!u || u.zone_type === "NO_CONFIRMADO"){
      return (u && u.nombre ? u.nombre : "NO_CONFIRMADO") + " (stats NO_CONFIRMADO)";
    }
    return u.nombre + " (zona "+u.zone_type+" · K/j "+u.k_per_game+" · BB/j "+u.bb_per_game+" · "+u.k_tier+")";
  }

  function serieParqueHtml(venue, bloquesSerie, rosterMap){
    var b = serieDelParque(venue, bloquesSerie);
    if(!b){
      return '<div class="serieparque"><div class="sphdr">SERIE EN ESTE PARQUE</div>'+
             '<div class="spsub">Sin serie en cache para este parque todavía.</div></div>';
    }
    var tr = (typeof analizarTrayectoria === "function") ? analizarTrayectoria(b) : {tendencia:"ESTABLE",min:null,max:null,saltos:[]};
    var clsTend = tr.tendencia==="SUBE" ? "sp-up" : (tr.tendencia==="BAJA" ? "sp-down" : "sp-flat");
    var rango = (tr.min!==null && tr.max!==null) ? (" ("+tr.min+"° a "+tr.max+"°)") : "";
    var trayHtml = '<div class="sptray '+clsTend+'">Clima de la serie: '+tr.tendencia+rango+'</div>';
    var saltosHtml = "";
    if(tr.saltos && tr.saltos.length){
      for(var s=0;s<tr.saltos.length;s++){
        var sa = tr.saltos[s];
        saltosHtml += '<div class="spsalto">⚠️ Salto '+sa.date+': '+sa.de+'° → '+sa.a+'° ('+(sa.dif>0?"+":"")+sa.dif+'°)</div>';
      }
    }
    var filas = "";
    var sumRuns=0, nRuns=0;
    var juegosOrden = b.juegos.slice().sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
    for(var j=0;j<juegosOrden.length;j++){
      var g=juegosOrden[j];
      var ar = (g.away_runs!==undefined && g.away_runs!==null) ? g.away_runs : null;
      var hr = (g.home_runs!==undefined && g.home_runs!==null) ? g.home_runs : null;
      var carrChip;
      if(ar!==null && hr!==null){ var tot=ar+hr; carrChip='<span class="chip">⚾ <b>'+ar+'-'+hr+'</b> ('+tot+')</span>'; sumRuns+=tot; nRuns++; }
      else { carrChip='<span class="chip">⚾ sin marcador</span>'; }
      var tempChip = (g.temperature_f!==undefined && g.temperature_f!==null && g.temperature_f!=="") ? '<span class="chip">🌡️ <b>'+g.temperature_f+'°</b></span>' : '<span class="chip">🌡️ PEND</span>';
      var vientoChip = '<span class="chip">🌬️ <b>'+(g.windspeed_mph!==undefined?g.windspeed_mph:"?")+'</b></span>';
      var humChip = '<span class="chip">💧 <b>'+(g.humidity_pct!==undefined?g.humidity_pct+"%":"?")+'</b></span>';
      filas += '<div class="sub">'+
        '<div class="top"><span class="fecha">'+fechaBonita(g.date)+'</span> · '+(g.away_team||"?")+' @ '+(g.home_team||"?")+'</div>'+
        '<div class="nums">'+tempChip+vientoChip+humChip+carrChip+'</div>'+
        '</div>';
    }
    var prom = "";
    if(nRuns>0){
      var promRuns = (sumRuns/nRuns).toFixed(1);
      prom = '<div class="spprom"><div class="lbl">PROMEDIO DE CARRERAS DE LA SERIE ('+nRuns+' juegos con marcador)</div>'+
        '<div class="val">'+promRuns+'</div></div>';
    } else {
      prom = '<div class="spprom"><div class="lbl">Sin marcadores en esta serie.</div></div>';
    }
    return '<div class="serieparque">'+
      '<div class="sphdr">SERIE EN ESTE PARQUE</div>'+
      '<div class="spsub">'+(b.home_team||"?")+' · '+fechaBonita(b.fecha_inicio)+' a '+fechaBonita(b.fecha_fin)+' · '+b.n_juegos+' juegos</div>'+
      trayHtml + saltosHtml + filas + prom +
    '</div>';
  }

  function tarjeta(away,home,venue,r,idx,today,pitcherAway,pitcherHome,pitcherAwayId,pitcherHomeId,bloquesSerie,rosterMap,catcherAwayId,catcherHomeId,umpireHomeHoy,lineaMercado){
    var sc = r && r.top ? r.top.score : null;
    var cls = r ? r.cls : "bad";
    var brisaInfo = (typeof BRISA_GEO_PARQUES_MLB_2026 !== "undefined" && BRISA_GEO_PARQUES_MLB_2026[venue]) ? BRISA_GEO_PARQUES_MLB_2026[venue] : null;

    var hoychips = "";
    if(today){
      hoychips = '<div class="hoychips">'+
        '<span class="chip">🌡️ <b>'+(today.temperature_f!==undefined?today.temperature_f+"°":"?")+'</b></span>'+
        '<span class="chip">🌬️ <b>'+(today.windspeed_mph!==undefined?today.windspeed_mph:"?")+'</b></span>'+
        '<span class="chip">🧭 dir <b>'+(today.wind_dir!==undefined && today.wind_dir!==null && today.wind_dir!==""?today.wind_dir:"N/C")+'</b></span>'+
        '<span class="chip">💧 <b>'+(today.humidity_pct!==undefined?today.humidity_pct+"%":"?")+'</b></span>'+
        (brisaInfo ? '<span class="chip brisachip">🌬️ '+brisaInfo.variante+'</span>' : '')+
      '</div>';
    } else if(brisaInfo){
      hoychips = '<div class="hoychips"><span class="chip brisachip">🌬️ '+brisaInfo.variante+'</span></div>';
    }

    var sumScore=0, nScore=0, sumRuns=0, nRuns=0;
    if(r && r.ranked && r.ranked.length){
      for(var k=0;k<r.ranked.length;k++){
        var hk=r.ranked[k];
        var ark = (hk.away_runs!==undefined && hk.away_runs!==null) ? hk.away_runs : null;
        var hrk = (hk.home_runs!==undefined && hk.home_runs!==null) ? hk.home_runs : null;
        if(ark!==null && hrk!==null){ sumRuns += (ark+hrk); nRuns++; }
        if(typeof hk.score === "number"){ sumScore += hk.score; nScore++; }
      }
    }
    var promScore = nScore>0 ? Math.round(sumScore/nScore) : null;
    var promRuns  = nRuns>0  ? (sumRuns/nRuns).toFixed(1) : null;

    var coinTxt = (sc===null) ? "—" : (sc+"%");
    var panel =
      '<div class="panel">'+
        '<div class="pbox"><div class="lbl">COINCIDENCIA</div><div class="val v-coin '+cls+'">'+coinTxt+'</div></div>'+
        '<div class="pbox"><div class="lbl">COINC. PROMEDIO</div><div class="val v-run">'+(promScore!==null?promScore+"%":"—")+'</div></div>'+
      '</div>';

    // LÍNEA DE MERCADO — real si existe, PENDIENTE si no
    var mercadoVal, mercadoClass;
    if(lineaMercado && lineaMercado.total !== null){
      mercadoVal = lineaMercado.total + (lineaMercado.bookie ? '<br><span style="font-size:9px;color:#555;">'+lineaMercado.bookie+'</span>' : '');
      mercadoClass = 'val';
    } else {
      mercadoVal = 'N/C';
      mercadoClass = 'val pendiente';
    }

    var lineas =
      '<div class="lineas">'+
        '<div class="lbox"><div class="lbl">LÍNEA DATAPRO</div><div class="val">'+(promRuns!==null?promRuns:"—")+'</div></div>'+
        '<div class="lbox mercado"><div class="lbl">LÍNEA DE MERCADO</div><div class="'+mercadoClass+'">'+mercadoVal+'</div></div>'+
      '</div>';

    function xeraTxt(pid){
      if(pid===null || pid===undefined) return "";
      var p = (typeof PITCHERS_MASTER_2026 !== "undefined") ? PITCHERS_MASTER_2026[pid] : null;
      if(!p || p.xera===undefined || p.xera===null) return " (xERA NO CONFIRMADO)";
      return " (xERA "+p.xera+" general)";
    }
    var pitchersHoy = '⚾ '+(pitcherAway||"TBD")+xeraTxt(pitcherAwayId)+' vs '+(pitcherHome||"TBD")+xeraTxt(pitcherHomeId);
    var ca = traducirCatcher(catcherAwayId);
    var ch = traducirCatcher(catcherHomeId);
    function rvTxt(rv){
      if(rv===undefined || rv===null || rv==="NO_CONFIRMADO") return " (rv_tot NO_CONFIRMADO)";
      return " (rv_tot "+rv+")";
    }
    var catchersHoy = '🧤 '+ca.nombre+rvTxt(ca.rv_tot)+' vs '+ch.nombre+rvTxt(ch.rv_tot);
    var uHoy = traducirUmpire(umpireHomeHoy);
    var umpireHoy = '🧑‍⚖️ Umpire de plato: '+umpireTxt(uHoy);

    var foldHoy =
      '<details class="fold"><summary>Pitcher / Catcher / Umpire de hoy</summary>'+
        '<div class="sub">'+
          '<div class="hrow" style="border:0;padding:3px 0;">'+pitchersHoy+'</div>'+
          '<div class="hrow" style="border:0;padding:3px 0;">'+catchersHoy+'</div>'+
          '<div class="hrow" style="border:0;padding:3px 0;">'+umpireHoy+'</div>'+
        '</div>'+
      '</details>';

    var det5 = "";
    if(r && r.ranked && r.ranked.length){
      var series = agruparEnSeries(r.ranked);
      series.sort(function(a,b){ return a.ultima < b.ultima ? 1 : (a.ultima > b.ultima ? -1 : 0); });
      for(var sx=0;sx<series.length;sx++){
        var serie = series[sx];
        det5 += '<div class="serie-hdr">SERIE · '+(serie.home_team||"?")+' · '+serie.primera+' a '+serie.ultima+' · '+serie.juegos.length+' juego(s)</div>';
        var js = serie.juegos.slice().sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
        for(var jj=0;jj<js.length;jj++){
          var h=js[jj];
          var arr2 = (h.away_runs!==undefined && h.away_runs!==null) ? h.away_runs : null;
          var hrr2 = (h.home_runs!==undefined && h.home_runs!==null) ? h.home_runs : null;
          var carrChip2;
          if(arr2!==null && hrr2!==null){ var t2=arr2+hrr2; carrChip2='<span class="chip">⚾ <b>'+arr2+'-'+hrr2+'</b> ('+t2+')</span>'; }
          else { carrChip2='<span class="chip">⚾ sin marcador</span>'; }
          det5 += '<div class="sub">'+
            '<div class="top"><span class="fecha">'+fechaBonita(h.date)+'</span> · '+(h.away_team||"?")+' / '+(h.home_team||"?")+'</div>'+
            '<div class="nums">'+
              '<span class="chip">🌡️ <b>'+(h.temperature_f!==undefined?h.temperature_f+"°":"?")+'</b></span>'+
              '<span class="chip">🌬️ <b>'+(h.windspeed_mph!==undefined?h.windspeed_mph:"?")+'</b></span>'+
              '<span class="chip">💧 <b>'+(h.humidity_pct!==undefined?h.humidity_pct+"%":"?")+'</b></span>'+
              '<span class="chip">score <b>'+h.score+'%</b></span>'+
              carrChip2+
            '</div>'+
          '</div>';
        }
      }
    } else {
      det5 = '<div class="sub">Sin históricos para mostrar.</div>';
    }
    var fold5 = '<div class="serieparque">'+
      '<div class="sphdr">5 PARECIDOS · CLIMA EN ESTE PARQUE</div>'+
      det5+'</div>';

    var serieHtml = '<details class="fold"><summary>Serie en este parque (por si ya jugaron en escena parecida)</summary>'+
      serieParqueHtml(venue, bloquesSerie, rosterMap)+'</details>';

    return '<div class="juego">'+
      '<div class="matchup">'+away+' @ '+home+'</div>'+
      '<div class="estadio">'+(venue||"SIN PARQUE")+'</div>'+
      hoychips +
      panel +
      lineas +
      fold5 +
      foldHoy +
      serieHtml +
      '</div>';
  }
</script>
</body>
</html>
