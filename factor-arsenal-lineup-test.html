  <script src="factor-arsenal-lineup.js"></script>

  <script>
    function agregarResultado(nombre, paso, esperado, recibido) {
      const contenedor = document.getElementById("resultados");

      const bloque = document.createElement("div");
      bloque.className = "prueba " + (paso ? "pass" : "fail");

      const titulo = document.createElement("div");
      titulo.className = "titulo";
      titulo.textContent = (paso ? "✅ PASS · " : "❌ FAIL · ") + nombre;

      const detalle = document.createElement("pre");
      detalle.textContent =
        "Esperado:\n" +
        JSON.stringify(esperado, null, 2) +
        "\n\nRecibido:\n" +
        JSON.stringify(recibido, null, 2);

      bloque.appendChild(titulo);
      bloque.appendChild(detalle);
      contenedor.appendChild(bloque);
    }

    function igual(a, b) {
      return JSON.stringify(a) === JSON.stringify(b);
    }

    function correrPruebas() {
      const resultados = document.getElementById("resultados");
      const resumen = document.getElementById("resumen");

      resultados.innerHTML = "";
      resumen.textContent = "Ejecutando...";

      let pass = 0;
      let fail = 0;

      var lineupCompleto = [
        { player_id: 2001 },
        { player_id: 2002 },
        { player_id: 2003 },
        { player_id: 2004 },
        { player_id: 2005 },
        { player_id: 2006 },
        { player_id: 2007 },
        { player_id: 2008 },
        { player_id: 2009 }
      ];

      var prueba1 = calcularFactorArsenalLineup(
        1001,
        lineupCompleto
      );

      var paso1 =
        prueba1.confirmado === true &&
        prueba1.nota === "OK" &&
        prueba1.bateadores_usados === 9 &&
        prueba1.woba_esperado !== null &&
        prueba1.woba_liga_ref !== null &&
        Number.isFinite(prueba1.factor);

      agregarResultado(
        "Lineup completo y arsenal válido",
        paso1,
        {
          confirmado: true,
          nota: "OK",
          bateadores_usados: 9,
          factor: "NUMERO_FINITO"
        },
        prueba1
      );

      paso1 ? pass++ : fail++;

      var prueba2 = calcularFactorArsenalLineup(
        1001,
        []
      );

      var paso2 =
        prueba2.confirmado === false &&
        prueba2.factor === 1 &&
        prueba2.nota === "SIN_LINEUP_CONFIRMADO";

      agregarResultado(
        "Sin lineup confirmado",
        paso2,
        {
          confirmado: false,
          factor: 1,
          nota: "SIN_LINEUP_CONFIRMADO"
        },
        prueba2
      );

      paso2 ? pass++ : fail++;

      var prueba3 = calcularFactorArsenalLineup(
        1002,
        lineupCompleto
      );

      var paso3 =
        prueba3.confirmado === false &&
        prueba3.factor === 1 &&
        prueba3.nota === "SIN_ARSENAL_CONFIRMADO";

      agregarResultado(
        "Pitcher sin arsenal",
        paso3,
        {
          confirmado: false,
          factor: 1,
          nota: "SIN_ARSENAL_CONFIRMADO"
        },
        prueba3
      );

      paso3 ? pass++ : fail++;

      var lineupParcial = [
        { player_id: 2001 },
        { player_id: 2002 },
        { player_id: 2010 },
        { player_id: 999999 }
      ];

      var prueba4 = calcularFactorArsenalLineup(
        1001,
        lineupParcial
      );

      var paso4 =
        prueba4.confirmado === false &&
        prueba4.bateadores_usados === 2 &&
        prueba4.nota === "MUESTRA_PARCIAL_2_DE_4";

      agregarResultado(
        "Muestra parcial",
        paso4,
        {
          confirmado: false,
          bateadores_usados: 2,
          nota: "MUESTRA_PARCIAL_2_DE_4"
        },
        prueba4
      );

      paso4 ? pass++ : fail++;

      var prueba5 = calcularFactorArsenalLineup(
        1003,
        [
          { player_id: 2011 }
        ]
      );

      var paso5 =
        prueba5.confirmado === false &&
        prueba5.factor === 1 &&
        prueba5.woba_esperado === null &&
        prueba5.bateadores_usados === 0 &&
        prueba5.nota === "SIN_DATOS_SUFICIENTES_EN_LINEUP";

      agregarResultado(
        "Sin datos suficientes",
        paso5,
        {
          confirmado: false,
          factor: 1,
          bateadores_usados: 0,
          nota: "SIN_DATOS_SUFICIENTES_EN_LINEUP"
        },
        prueba5
      );

      paso5 ? pass++ : fail++;

      var respaldoBatters = BATTERS_VSPITCH_2026;

      BATTERS_VSPITCH_2026 = undefined;
      _wobaLigaCache = undefined;

      var prueba6 = calcularFactorArsenalLineup(
        1001,
        lineupCompleto
      );

      var paso6 =
        prueba6.confirmado === false &&
        prueba6.factor === 1 &&
        prueba6.woba_liga_ref === null &&
        prueba6.nota === "SIN_REFERENCIA_WOBA_LIGA";

      agregarResultado(
        "Sin referencia real de liga",
        paso6,
        {
          confirmado: false,
          factor: 1,
          woba_liga_ref: null,
          nota: "SIN_REFERENCIA_WOBA_LIGA"
        },
        prueba6
      );

      paso6 ? pass++ : fail++;

      BATTERS_VSPITCH_2026 = respaldoBatters;
      _wobaLigaCache = undefined;

      resumen.textContent =
        pass + "/6 PASS · " +
        fail + "/6 FAIL";

      resumen.style.color =
        fail === 0 ? "#3fb950" : "#f85149";

      console.log(
        "MLBPro Arsenal vs Lineup:",
        {
          pass: pass,
          fail: fail
        }
      );
    }

    window.addEventListener("load", correrPruebas);
