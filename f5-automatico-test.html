  .brujula-wrap {

<script>
var consoleEl = document.getElementById("console");
var listaEl = document.getElementById("lista");
var corriendo = false;

function log(t) {
  var d = document.createElement("div");
  d.textContent = t;
  consoleEl.appendChild(d);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

function esNumero(v) {
  return typeof v === "number" && Number.isFinite(v);
}

function fmtAmerican(n) {
  if (!esNumero(n)) return "N/C";
  return (n > 0 ? "+" : "") + n;
}

function fmtPct(n) {
  if (!esNumero(n)) return "N/C";
  return n.toFixed(1) + "%";
}

function nc(v) {
  return v === null ||
    v === undefined ||
    v === "" ||
    (typeof v === "number" && !Number.isFinite(v));
}

function escapar(v) {
  if (v === null || v === undefined) return "NO_CONFIRMADO";

  return String(v).replace(/[&<>"']/g, function(c) {
    return {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[c];
  });
}

function detalleCarreraje(c) {
  if (!c) return "NO_CONFIRMADO";

  var partes = [escapar(c.estado)];

  if (typeof c.dominioPitcher === "string") {
    partes.push("Dominio: " + escapar(c.dominioPitcher));
  }

  if (esNumero(c.wobaEsperado)) {
    partes.push("wOBA esp.: " + c.wobaEsperado.toFixed(3));
  }

  return partes.join("<br>");
}

function probabilidadAmericana(cuota) {
  if (!esNumero(cuota) || cuota === 0) {
    return null;
  }

  if (cuota < 0) {
    return (-cuota) / ((-cuota) + 100);
  }

  return 100 / (cuota + 100);
}

function favoritoMercado(
  awayNombre,
  homeNombre,
  awayPrice,
  homePrice
) {
  var probAway = probabilidadAmericana(awayPrice);
  var probHome = probabilidadAmericana(homePrice);

  if (
    !esNumero(probAway) ||
    !esNumero(probHome)
  ) {
    return {
      lado: null,
      nombre: "NO_CONFIRMADO"
    };
  }

  if (probAway > probHome) {
    return {
      lado: "VISITANTE",
      nombre: awayNombre
    };
  }

  if (probHome > probAway) {
    return {
      lado: "LOCAL",
      nombre: homeNombre
    };
  }

  return {
    lado: "EMPATE",
    nombre: "PAREJO"
  };
}

function favoritoMlbPro(
  awayNombre,
  homeNombre,
  pctAway,
  pctHome
) {
  if (
    !esNumero(pctAway) ||
    !esNumero(pctHome)
  ) {
    return {
      lado: null,
      nombre: "NO_CONFIRMADO"
    };
  }

  if (pctAway > pctHome) {
    return {
      lado: "VISITANTE",
      nombre: awayNombre
    };
  }

  if (pctHome > pctAway) {
    return {
      lado: "LOCAL",
      nombre: homeNombre
    };
  }

  return {
    lado: "EMPATE",
    nombre: "PAREJO"
  };
}

function equipoSeleccionado(
  seleccion,
  awayNombre,
  homeNombre
) {
  if (seleccion === "VISITANTE") {
    return awayNombre;
  }

  if (seleccion === "LOCAL") {
    return homeNombre;
  }

  if (seleccion === "SIN_VALOR_CONFIRMADO") {
    return "SIN APUESTA CON VALOR";
  }

  if (seleccion === "PAREJO_SIN_VENTAJA") {
    return "PAREJO — SIN VENTAJA";
  }

  return "NO_CONFIRMADO";
}

async function correrTodo() {
  if (corriendo) return;

  corriendo = true;

  var btn = document.getElementById("btnCorrer");

  btn.disabled = true;
  btn.textContent = "TRABAJANDO…";

  consoleEl.textContent = "";
  listaEl.innerHTML = "";

  try {
    var resultados = await f5AutomaticoHoy(log);
    var html = "";

    resultados.forEach(function(r) {
      var lm = r.lineaMercadoF5;
      var propio = r.moneyline || {};

      var partesJuego = String(r.juego || "").split(" @ ");
      var awayNombre = partesJuego[0] || "Away";
      var homeNombre = partesJuego[1] || "Home";

      var awayPrice =
        lm && lm.moneylineF5
          ? lm.moneylineF5.away_price
          : null;

      var homePrice =
        lm && lm.moneylineF5
          ? lm.moneylineF5.home_price
          : null;

      var pctAway = propio.porcentajeVisitanteDosVias;
      var pctHome = propio.porcentajeLocalDosVias;
      var pctEmpate = propio.porcentajeEmpate;

      var ventajaAway = propio.ventajaVisitantePct;
      var ventajaHome = propio.ventajaLocalPct;

      var valorAway = propio.seleccion === "VISITANTE";
      var valorHome = propio.seleccion === "LOCAL";

      var favoritoMercadoObj =
        favoritoMercado(
          awayNombre,
          homeNombre,
          awayPrice,
          homePrice
        );

      var favoritoMlbProObj =
        favoritoMlbPro(
          awayNombre,
          homeNombre,
          pctAway,
          pctHome
        );

      var seleccionNombre =
        equipoSeleccionado(
          propio.seleccion,
          awayNombre,
          homeNombre
        );

      var awayFavoritoMercado =
        favoritoMercadoObj.lado === "VISITANTE";

      var homeFavoritoMercado =
        favoritoMercadoObj.lado === "LOCAL";

      var awayFavoritoMlbPro =
        favoritoMlbProObj.lado === "VISITANTE";

      var homeFavoritoMlbPro =
        favoritoMlbProObj.lado === "LOCAL";

      var awayClases = "equipo-col";
      var homeClases = "equipo-col";

      if (awayFavoritoMercado) {
        awayClases += " favorito-mercado";
      }

      if (awayFavoritoMlbPro) {
        awayClases += " favorito-mlbpro";
      }

      if (homeFavoritoMercado) {
        homeClases += " favorito-mercado";
      }

      if (homeFavoritoMlbPro) {
        homeClases += " favorito-mlbpro";
      }

      var etiquetasAway = "";

      if (awayFavoritoMercado) {
        etiquetasAway +=
          '<span class="etiqueta-equipo mercado">FAVORITO MERCADO</span>';
      }

      if (awayFavoritoMlbPro) {
        etiquetasAway +=
          '<span class="etiqueta-equipo mlbpro">FAVORITO MLBPRO</span>';
      }

      var etiquetasHome = "";

      if (homeFavoritoMercado) {
        etiquetasHome +=
          '<span class="etiqueta-equipo mercado">FAVORITO MERCADO</span>';
      }

      if (homeFavoritoMlbPro) {
        etiquetasHome +=
          '<span class="etiqueta-equipo mlbpro">FAVORITO MLBPRO</span>';
      }

      var estadoPropio =
        propio.estado === "PORCENTAJE_EMPIRICO"
          ? "PORCENTAJE EMPÍRICO"
          : escapar(propio.estado || "NO_CONFIRMADO");

      var congelTxt =
        lm && lm.congelada
          ? '<div class="congelada">🧊 línea congelada pregame</div>'
          : "";

      var totalPoint =
        lm &&
        lm.totalF5 &&
        esNumero(lm.totalF5.point)
          ? lm.totalF5.point
          : "N/C";

      var totalOver =
        lm && lm.totalF5
          ? fmtAmerican(lm.totalF5.over_price)
          : "N/C";

      var totalUnder =
        lm && lm.totalF5
          ? fmtAmerican(lm.totalF5.under_price)
          : "N/C";

      var tempTxt =
        esNumero(r.tempF)
          ? r.tempF + "°F"
          : "NO_CONFIRMADO";

      var humedadTxt =
        esNumero(r.humedad)
          ? r.humedad + "%"
          : "NO_CONFIRMADO";

      var vientoTxt =
        esNumero(r.vientoMph)
          ? r.vientoMph + " mph"
          : "NO_CONFIRMADO";

      var direccionTxt =
        esNumero(r.direccionViento)
          ? r.direccionViento + "°"
          : "NO_CONFIRMADO";

      var techoTxt =
        nc(r.roof)
          ? "NO_CONFIRMADO"
          : escapar(r.roof);

      var tieneDireccion = esNumero(r.direccionViento);
      var grados = tieneDireccion ? r.direccionViento : 0;
      var vaHacia = tieneDireccion ? (grados + 180) % 360 : 0;

      var seleccionClase =
        propio.seleccion === "LOCAL" ||
        propio.seleccion === "VISITANTE"
          ? "valor"
          : "sin-valor";

      var brujulaSvg =
        '<svg width="150" height="150" viewBox="0 0 150 150">' +
          '<circle cx="75" cy="75" r="70" fill="#0d1117" stroke="#30363d" stroke-width="2"/>' +
          '<text x="75" y="18" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">N</text>' +
          '<text x="132" y="79" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">E</text>' +
          '<text x="75" y="140" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">S</text>' +
          '<text x="18" y="79" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">O</text>' +
          (
            tieneDireccion
              ? '<g transform="rotate(' + vaHacia + ' 75 75)">' +
                  '<line x1="75" y1="75" x2="75" y2="24" stroke="#79c0ff" stroke-width="4" stroke-linecap="round"/>' +
                  '<circle cx="75" cy="75" r="5" fill="#79c0ff"/>' +
                '</g>'
              : '<circle cx="75" cy="75" r="5" fill="#30363d"/>'
          ) +
        '</svg>';

      html +=
        '<div class="juego">' +

          '<div class="venue">' +
            escapar(r.venue || "?") +
          '</div>' +

          congelTxt +

          '<div class="equipos-cabecera">' +

            '<div class="' + awayClases + '">' +
              '<div class="nombre">' + escapar(awayNombre) + '</div>' +
              '<div class="cuota">' + fmtAmerican(awayPrice) + '</div>' +
              '<div class="etiquetas-equipo">' + etiquetasAway + '</div>' +
              '<div class="porcentaje">' + fmtPct(pctAway) + '</div>' +
              '<div class="porcentaje-label">MLBPro visitante</div>' +
              '<div class="ventaja">Ventaja mercado: ' + fmtPct(ventajaAway) + '</div>' +
              '<span class="fav ' + (valorAway ? "si" : "no") + '">' +
                (valorAway ? "VALOR" : "SIN VALOR") +
              '</span>' +
            '</div>' +

            '<div class="' + homeClases + '">' +
              '<div class="nombre">' + escapar(homeNombre) + '</div>' +
              '<div class="cuota">' + fmtAmerican(homePrice) + '</div>' +
              '<div class="etiquetas-equipo">' + etiquetasHome + '</div>' +
              '<div class="porcentaje">' + fmtPct(pctHome) + '</div>' +
              '<div class="porcentaje-label">MLBPro local</div>' +
              '<div class="ventaja">Ventaja mercado: ' + fmtPct(ventajaHome) + '</div>' +
              '<span class="fav ' + (valorHome ? "si" : "no") + '">' +
                (valorHome ? "VALOR" : "SIN VALOR") +
              '</span>' +
            '</div>' +

          '</div>' +

          '<div class="resumen-decision">' +

            '<div class="decision-fila">' +
              '<div class="decision-titulo">Favorito del mercado</div>' +
              '<div class="decision-valor mercado">' +
                escapar(favoritoMercadoObj.nombre) +
              '</div>' +
            '</div>' +

            '<div class="decision-fila">' +
              '<div class="decision-titulo">Favorito MLBPro</div>' +
              '<div class="decision-valor mlbpro">' +
                escapar(favoritoMlbProObj.nombre) +
              '</div>' +
            '</div>' +

            '<div class="decision-fila">' +
              '<div class="decision-titulo">Selección con valor</div>' +
              '<div class="decision-valor ' + seleccionClase + '">' +
                escapar(seleccionNombre) +
              '</div>' +
            '</div>' +

          '</div>' +

          '<div class="empate-f5">' +
            '<div class="t">Empate después de cinco entradas</div>' +
            '<div class="v">' + fmtPct(pctEmpate) + '</div>' +
          '</div>' +

          '<div class="total-central">' +
            '<div class="tit">Total F5 de mercado</div>' +
            '<div class="filas">' +
              '<div class="fila">OVER <b>' + totalPoint + '</b><br>' + totalOver + '</div>' +
              '<div class="fila">UNDER <b>' + totalPoint + '</b><br>' + totalUnder + '</div>' +
            '</div>' +
          '</div>' +

          '<div class="clima-fila">' +
            '<div class="clima-item">Temp.<span class="v">' + tempTxt + '</span></div>' +
            '<div class="clima-item">Humedad<span class="v">' + humedadTxt + '</span></div>' +
            '<div class="clima-item">Viento<span class="v">' + vientoTxt + '</span></div>' +
            '<div class="clima-item">Dirección<span class="v">' + direccionTxt + '</span></div>' +
            '<div class="clima-item">Techo<span class="v">' + techoTxt + '</span></div>' +
          '</div>' +

          '<div class="mediciones">' +

            '<div class="medicion">' +
              '<div class="t">Estado MLBPro</div>' +
              '<div class="v">' + estadoPropio + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Selección</div>' +
              '<div class="v">' + escapar(seleccionNombre) + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Muestra histórica</div>' +
              '<div class="v">' + (esNumero(propio.muestra) ? propio.muestra : "N/C") + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Base histórica</div>' +
              '<div class="v">' + (esNumero(propio.base_historica) ? propio.base_historica : "N/C") + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Coincidencia</div>' +
              '<div class="v">' +
                escapar(r.coincidencia && r.coincidencia.estado) +
                ' (' +
                escapar(r.coincidencia && r.coincidencia.confirmados) +
                ')' +
              '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Bucket</div>' +
              '<div class="v">' + escapar(propio.bucket || "NO_CONFIRMADO") + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Carreraje Home</div>' +
              '<div class="v">' + detalleCarreraje(r.carrerajeHome) + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Carreraje Away</div>' +
              '<div class="v">' + detalleCarreraje(r.carrerajeAway) + '</div>' +
            '</div>' +

          '</div>' +

          '<div class="brujula-wrap">' +
            brujulaSvg +
          '</div>' +

          '<div class="brujula-cap">' +
            (
              tieneDireccion
                ? 'viene de ' + grados + '° → va hacia ' + vaHacia + '°'
                : 'Dirección de viento: NO_CONFIRMADO'
            ) +
          '</div>' +

          '<details class="detalle">' +
            '<summary>Ver detalle completo</summary>' +
            '<div><b>Favorito mercado:</b> ' + escapar(favoritoMercadoObj.nombre) + '</div>' +
            '<div><b>Favorito MLBPro:</b> ' + escapar(favoritoMlbProObj.nombre) + '</div>' +
            '<div><b>Selección con valor:</b> ' + escapar(seleccionNombre) + '</div>' +
            '<div><b>Estado:</b> ' + estadoPropio + '</div>' +
            '<div><b>Local bruto:</b> ' + fmtPct(propio.porcentajeLocal) + '</div>' +
            '<div><b>Visitante bruto:</b> ' + fmtPct(propio.porcentajeVisitante) + '</div>' +
            '<div><b>Empate:</b> ' + fmtPct(propio.porcentajeEmpate) + '</div>' +
            '<div><b>Local dos vías:</b> ' + fmtPct(propio.porcentajeLocalDosVias) + '</div>' +
            '<div><b>Visitante dos vías:</b> ' + fmtPct(propio.porcentajeVisitanteDosVias) + '</div>' +
            '<div><b>Selección interna:</b> ' + escapar(propio.seleccion || "NO_CONFIRMADO") + '</div>' +
            '<div><b>Detalle:</b> ' + escapar(propio.detalle || "") + '</div>' +
          '</details>' +

        '</div>';
    });

    listaEl.innerHTML = html;

  } catch (e) {
    log("ERROR: " + (e && e.message ? e.message : e));
  } finally {
    corriendo = false;
    btn.disabled = false;
    btn.textContent = "CORRER F5 AUTOMÁTICO (juegos de hoy)";
  }
}

document
  .getElementById("btnCorrer")
  .addEventListener("click", correrTodo);

var autoIntervalId = null;

document
  .getElementById("btnAuto")
  .addEventListener("click", function() {
    var btn = this;

    if (autoIntervalId) {
      clearInterval(autoIntervalId);
      autoIntervalId = null;

      btn.classList.remove("activo");
      btn.textContent = "🔄 Auto-actualizar cada 30 min: OFF";
    } else {
      autoIntervalId = setInterval(
        correrTodo,
        30 * 60 * 1000
      );

      btn.classList.add("activo");
      btn.textContent = "🔄 Auto-actualizar cada 30 min: ON";
    }
  });
</script>

</body>
</html>
