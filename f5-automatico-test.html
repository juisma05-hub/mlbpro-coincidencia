<!--
  MLBPro · f5-automatico-test.html

  FUNCIÓN:
  Página de prueba manual para f5AutomaticoHoy(): corre el pipeline F5
  completo sobre los juegos reales de hoy y renderiza, por juego, el
  resultado de cada bloque F5 por separado (clima, línea de mercado,
  coincidencia, carreraje, moneyline empírico, fuerza de equipo F5). No
  calcula nada aquí: solo formatea y muestra lo que ya devuelve
  f5AutomaticoHoy() desde f5-automatico.js. Esta pantalla NO produce
  selección final de ningún tipo — ni Moneyline F5 ni Fuerza de Equipo F5
  eligen ganador; ambas piezas se muestran como evidencia separada.

  ENTRADAS:
  Ninguna externa directa. Depende de que todos los <script> del pipeline
  F5 (mlb-routes.js, estadios.js, clima-cache.js, jalar-clima.js,
  jalar-linea-f5.js, jalar-lineup.js, arsenal-master.js,
  batters-vspitch.js, pitchers-master.js, catchers-master.js,
  factor-arsenal-lineup.js, perfil-pitcher-builder.js,
  proyeccion-pitcher-temprana.js, f5-estadio.js, f5-roof.js,
  f5-temperatura.js, f5-viento.js, f5-pitcher.js, f5-coincidencia.js,
  f5-carreraje.js, f5-moneyline.js, f5-fuerza-equipo.js,
  f5-automatico.js) estén cargados en ese orden antes del bloque de
  script propio de esta página.

  SALIDAS / MODIFICACIONES:
  Solo renderiza HTML en #lista y líneas de log en #console. No escribe
  ninguna caché ni localStorage. Lee (a través de f5-automatico.js y sus
  dependencias) F5_HISTORICO_CARRERAJE_2026 y F5_HISTORICO_LINEUP_2026,
  pero nunca directamente — siempre a través de las funciones ya
  cargadas.

  FUERZA DE EQUIPO F5 (bloque agregado en esta corrección):
  r.fuerzaEquipoF5 trae { local, visitante, enfrentamientos, abridorLocal,
  abridorVisitante }, tal como lo arma calcularFuerzaEquipoF5ParaJuego()
  en f5-fuerza-equipo.js. Los nombres de campo usados aquí son los reales
  de ese archivo (no se inventó ningún nombre):
    - Fuerza de equipo (local/visitante): estado, general.{muestra,
      ganados, perdidos, empates, carrerasAnotadas, carrerasPermitidas,
      diferencial, promedioAnotadas, promedioPermitidas}, ultimos5.{estado,
      muestra, porcentaje_victorias_f5, diferencial_promedio}.
    - Enfrentamientos directos: estado,
      resumen_desde_perspectiva_a.{muestra, ganados, perdidos, empates,
      diferencial}.
    - Abridor (local/visitante): estado, muestra, ganados_f5, perdidos_f5,
      empates_f5, porcentaje_victorias_f5,
      promedio_carreras_equipo_f5_en_aperturas,
      promedio_carreras_rival_f5_en_aperturas, diferencial_promedio_f5,
      ultimos5.{estado, muestra, porcentaje_victorias_f5}.
  Ningún campo faltante se convierte en 0 ni en valor neutral: si el dato
  no existe, se muestra "N/C" o "NO_CONFIRMADO".

  CORRECCIÓN 21 jul 2026:
  - Se mantiene el orden de script: f5-moneyline.js, f5-fuerza-equipo.js,
    f5-automatico.js (en ese orden, f5-fuerza-equipo.js antes de
    f5-automatico.js).
  - Se eliminaron por completo: ventajaAway, ventajaHome, valorAway,
    valorHome, el texto "Ventaja mercado", las etiquetas VALOR / SIN
    VALOR, el bloque "Selección" y toda referencia a propio.seleccion —
    f5-moneyline.js no elige ganador (seleccion siempre null), así que
    esos campos y etiquetas quedaban muertos en pantalla.
  - Se agregaron cinco bloques de Fuerza F5 por juego: Fuerza F5
    visitante, Fuerza F5 local, Enfrentamientos directos, Abridor
    visitante, Abridor local — leídos de r.fuerzaEquipoF5 con los nombres
    de campo reales de f5-fuerza-equipo.js.
  - Se conservan intactos: porcentajes empíricos local/visitante/empate,
    cuotas, total F5 de mercado, clima (temp/humedad/viento/dirección/
    techo), coincidencia, bucket, muestra histórica, base histórica,
    carreraje local/visitante, brújula, auto-actualización.

  NO TOCA:
  f5-automatico.js, f5-moneyline.js (no cambia calibración ni
  porcentajes empíricos), f5-carreraje.js, f5-coincidencia.js,
  f5-fuerza-equipo.js. Esta página solo consume y muestra lo que esos
  archivos ya calculan.

  ESTADO:
  CONFIRMADO EN CÓDIGO — pendiente de correr en el navegador con datos
  reales antes de aprobar: verificar que Fuerza F5 no devuelva
  SIN_DEPENDENCIA, confirmar que ningún juego de hoy entra al histórico,
  correr la función principal, revisar consola sin errores, confirmar
  que la pantalla muestra los bloques reales.

  FECHA:
  21 jul 2026.
-->

<script>
var consoleEl = document.getElementById("console");
var listaEl = document.getElementById("lista");
var corriendo = false;

function log(t) {
  var d = document.createElement("div");
  d.textContent = t;
  consoleEl.appendChild(d);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

function esNumero(v) {
  return typeof v === "number" && Number.isFinite(v);
}

function fmtAmerican(n) {
  if (!esNumero(n)) return "N/C";
  return (n > 0 ? "+" : "") + n;
}

function fmtPct(n) {
  if (!esNumero(n)) return "N/C";
  return n.toFixed(1) + "%";
}

function nc(v) {
  return v === null ||
    v === undefined ||
    v === "" ||
    (typeof v === "number" && !Number.isFinite(v));
}

function escapar(v) {
  if (v === null || v === undefined) return "NO_CONFIRMADO";

  return String(v).replace(/[&<>"']/g, function(c) {
    return {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[c];
  });
}

function detalleCarreraje(c) {
  if (!c) return "NO_CONFIRMADO";

  var partes = [escapar(c.estado)];

  if (typeof c.dominioPitcher === "string") {
    partes.push("Dominio: " + escapar(c.dominioPitcher));
  }

  if (esNumero(c.wobaEsperado)) {
    partes.push("wOBA esp.: " + c.wobaEsperado.toFixed(3));
  }

  return partes.join("<br>");
}

function estadoTxt(v) {
  return escapar(v || "NO_CONFIRMADO");
}

function fmtN(v) {
  return esNumero(v) ? v : "N/C";
}

// Fuerza F5 de un equipo (local o visitante), campos reales de
// calcularFuerzaEquipoF5() en f5-fuerza-equipo.js: estado, general.*,
// ultimos5.*. Ningún campo faltante se rellena con 0.
function bloqueFuerzaEquipo(titulo, datos) {
  if (!datos || !datos.estado) {
    return (
      '<div class="medicion">' +
        '<div class="t">' + escapar(titulo) + '</div>' +
        '<div class="v nc">NO_CONFIRMADO</div>' +
      '</div>'
    );
  }

  var g = datos.general || {};
  var u5 = datos.ultimos5 || {};

  return (
    '<div class="medicion">' +
      '<div class="t">' + escapar(titulo) + '</div>' +
      '<div class="v">' +
        'Estado: ' + estadoTxt(datos.estado) + '<br>' +
        'Muestra: ' + fmtN(g.muestra) + '<br>' +
        'G/P/E: ' + fmtN(g.ganados) + '/' + fmtN(g.perdidos) + '/' + fmtN(g.empates) + '<br>' +
        'Carreras anot./perm.: ' + fmtN(g.carrerasAnotadas) + '/' + fmtN(g.carrerasPermitidas) + '<br>' +
        'Diferencial: ' + fmtN(g.diferencial) + '<br>' +
        'Prom. anot./perm.: ' + fmtN(g.promedioAnotadas) + '/' + fmtN(g.promedioPermitidas) + '<br>' +
        'Últimos 5: ' + estadoTxt(u5.estado) +
          ' (' + fmtN(u5.muestra) + ') · %V: ' +
          (esNumero(u5.porcentaje_victorias_f5) ? u5.porcentaje_victorias_f5 + '%' : "N/C") +
      '</div>' +
    '</div>'
  );
}

// Enfrentamientos directos, campos reales de calcularEnfrentamientosF5():
// estado, resumen_desde_perspectiva_a.*.
function bloqueEnfrentamientos(datos) {
  if (!datos || !datos.estado) {
    return (
      '<div class="medicion">' +
        '<div class="t">Enfrentamientos directos</div>' +
        '<div class="v nc">NO_CONFIRMADO</div>' +
      '</div>'
    );
  }

  var r = datos.resumen_desde_perspectiva_a || {};

  return (
    '<div class="medicion">' +
      '<div class="t">Enfrentamientos directos</div>' +
      '<div class="v">' +
        'Estado: ' + estadoTxt(datos.estado) + '<br>' +
        'Muestra: ' + fmtN(r.muestra) + '<br>' +
        'G/P/E (local): ' + fmtN(r.ganados) + '/' + fmtN(r.perdidos) + '/' + fmtN(r.empates) + '<br>' +
        'Diferencial: ' + fmtN(r.diferencial) +
      '</div>' +
    '</div>'
  );
}

// Historial F5 de un abridor (local o visitante), campos reales de
// calcularHistorialAbridorF5(): estado, muestra, ganados_f5/perdidos_f5/
// empates_f5, porcentaje_victorias_f5, promedio_carreras_equipo_f5_en_
// aperturas, promedio_carreras_rival_f5_en_aperturas,
// diferencial_promedio_f5, ultimos5.*.
function bloqueAbridor(titulo, datos) {
  if (!datos || !datos.estado) {
    return (
      '<div class="medicion">' +
        '<div class="t">' + escapar(titulo) + '</div>' +
        '<div class="v nc">NO_CONFIRMADO</div>' +
      '</div>'
    );
  }

  var u5 = datos.ultimos5 || {};

  return (
    '<div class="medicion">' +
      '<div class="t">' + escapar(titulo) + '</div>' +
      '<div class="v">' +
        'Estado: ' + estadoTxt(datos.estado) + '<br>' +
        'Aperturas: ' + fmtN(datos.muestra) + '<br>' +
        'G/P/E: ' + fmtN(datos.ganados_f5) + '/' + fmtN(datos.perdidos_f5) + '/' + fmtN(datos.empates_f5) + '<br>' +
        '%V F5: ' + (esNumero(datos.porcentaje_victorias_f5) ? datos.porcentaje_victorias_f5 + '%' : "N/C") + '<br>' +
        'Prom. equipo/rival: ' + fmtN(datos.promedio_carreras_equipo_f5_en_aperturas) + '/' + fmtN(datos.promedio_carreras_rival_f5_en_aperturas) + '<br>' +
        'Diferencial prom.: ' + fmtN(datos.diferencial_promedio_f5) + '<br>' +
        'Últimos 5: ' + estadoTxt(u5.estado) +
          ' (' + fmtN(u5.muestra) + ') · %V: ' +
          (esNumero(u5.porcentaje_victorias_f5) ? u5.porcentaje_victorias_f5 + '%' : "N/C") +
      '</div>' +
    '</div>'
  );
}

async function correrTodo() {
  if (corriendo) return;

  corriendo = true;

  var btn = document.getElementById("btnCorrer");

  btn.disabled = true;
  btn.textContent = "TRABAJANDO…";

  consoleEl.textContent = "";
  listaEl.innerHTML = "";

  try {
    var resultados = await f5AutomaticoHoy(log);
    var html = "";

    resultados.forEach(function(r) {
      var lm = r.lineaMercadoF5;
      var propio = r.moneyline || {};

      var fuerza = r.fuerzaEquipoF5 || {};
      var fuerzaLocal = fuerza.local || {};
      var fuerzaVisitante = fuerza.visitante || {};
      var enfrentamientos = fuerza.enfrentamientos || {};
      var abridorLocal = fuerza.abridorLocal || {};
      var abridorVisitante = fuerza.abridorVisitante || {};

      var partesJuego = String(r.juego || "").split(" @ ");
      var awayNombre = partesJuego[0] || "Away";
      var homeNombre = partesJuego[1] || "Home";

      var awayPrice =
        lm && lm.moneylineF5
          ? lm.moneylineF5.away_price
          : null;

      var homePrice =
        lm && lm.moneylineF5
          ? lm.moneylineF5.home_price
          : null;

      var pctAway = propio.porcentajeVisitanteDosVias;
      var pctHome = propio.porcentajeLocalDosVias;
      var pctEmpate = propio.porcentajeEmpate;

      var estadoPropio =
        propio.estado === "PORCENTAJE_EMPIRICO"
          ? "PORCENTAJE EMPÍRICO"
          : escapar(propio.estado || "NO_CONFIRMADO");

      var congelTxt =
        lm && lm.congelada
          ? '<div class="congelada">🧊 línea congelada pregame</div>'
          : "";

      var totalPoint =
        lm &&
        lm.totalF5 &&
        esNumero(lm.totalF5.point)
          ? lm.totalF5.point
          : "N/C";

      var totalOver =
        lm && lm.totalF5
          ? fmtAmerican(lm.totalF5.over_price)
          : "N/C";

      var totalUnder =
        lm && lm.totalF5
          ? fmtAmerican(lm.totalF5.under_price)
          : "N/C";

      var tempTxt =
        esNumero(r.tempF)
          ? r.tempF + "°F"
          : "NO_CONFIRMADO";

      var humedadTxt =
        esNumero(r.humedad)
          ? r.humedad + "%"
          : "NO_CONFIRMADO";

      var vientoTxt =
        esNumero(r.vientoMph)
          ? r.vientoMph + " mph"
          : "NO_CONFIRMADO";

      var direccionTxt =
        esNumero(r.direccionViento)
          ? r.direccionViento + "°"
          : "NO_CONFIRMADO";

      var techoTxt =
        nc(r.roof)
          ? "NO_CONFIRMADO"
          : escapar(r.roof);

      var tieneDireccion = esNumero(r.direccionViento);
      var grados = tieneDireccion ? r.direccionViento : 0;
      var vaHacia = tieneDireccion ? (grados + 180) % 360 : 0;

      var brujulaSvg =
        '<svg width="150" height="150" viewBox="0 0 150 150">' +
          '<circle cx="75" cy="75" r="70" fill="#0d1117" stroke="#30363d" stroke-width="2"/>' +
          '<text x="75" y="18" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">N</text>' +
          '<text x="132" y="79" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">E</text>' +
          '<text x="75" y="140" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">S</text>' +
          '<text x="18" y="79" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">O</text>' +
          (
            tieneDireccion
              ? '<g transform="rotate(' + vaHacia + ' 75 75)">' +
                  '<line x1="75" y1="75" x2="75" y2="24" stroke="#79c0ff" stroke-width="4" stroke-linecap="round"/>' +
                  '<circle cx="75" cy="75" r="5" fill="#79c0ff"/>' +
                '</g>'
              : '<circle cx="75" cy="75" r="5" fill="#30363d"/>'
          ) +
        '</svg>';

      html +=
        '<div class="juego">' +

          '<div class="venue">' +
            escapar(r.venue || "?") +
          '</div>' +

          congelTxt +

          '<div class="equipos-cabecera">' +

            '<div class="equipo-col">' +
              '<div class="nombre">' + escapar(awayNombre) + '</div>' +
              '<div class="cuota">' + fmtAmerican(awayPrice) + '</div>' +
              '<div class="porcentaje">' + fmtPct(pctAway) + '</div>' +
              '<div class="porcentaje-label">MLBPro visitante</div>' +
            '</div>' +

            '<div class="equipo-col">' +
              '<div class="nombre">' + escapar(homeNombre) + '</div>' +
              '<div class="cuota">' + fmtAmerican(homePrice) + '</div>' +
              '<div class="porcentaje">' + fmtPct(pctHome) + '</div>' +
              '<div class="porcentaje-label">MLBPro local</div>' +
            '</div>' +

          '</div>' +

          '<div class="empate-f5">' +
            '<div class="t">Empate después de cinco entradas</div>' +
            '<div class="v">' + fmtPct(pctEmpate) + '</div>' +
          '</div>' +

          '<div class="total-central">' +
            '<div class="tit">Total F5 de mercado</div>' +
            '<div class="filas">' +
              '<div class="fila">OVER <b>' + totalPoint + '</b><br>' + totalOver + '</div>' +
              '<div class="fila">UNDER <b>' + totalPoint + '</b><br>' + totalUnder + '</div>' +
            '</div>' +
          '</div>' +

          '<div class="clima-fila">' +
            '<div class="clima-item">Temp.<span class="v">' + tempTxt + '</span></div>' +
            '<div class="clima-item">Humedad<span class="v">' + humedadTxt + '</span></div>' +
            '<div class="clima-item">Viento<span class="v">' + vientoTxt + '</span></div>' +
            '<div class="clima-item">Dirección<span class="v">' + direccionTxt + '</span></div>' +
            '<div class="clima-item">Techo<span class="v">' + techoTxt + '</span></div>' +
          '</div>' +

          '<div class="mediciones">' +

            '<div class="medicion">' +
              '<div class="t">Estado MLBPro</div>' +
              '<div class="v">' + estadoPropio + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Muestra histórica</div>' +
              '<div class="v">' + (esNumero(propio.muestra) ? propio.muestra : "N/C") + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Base histórica</div>' +
              '<div class="v">' + (esNumero(propio.base_historica) ? propio.base_historica : "N/C") + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Coincidencia</div>' +
              '<div class="v">' +
                escapar(r.coincidencia && r.coincidencia.estado) +
                ' (' +
                escapar(r.coincidencia && r.coincidencia.confirmados) +
                ')' +
              '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Bucket</div>' +
              '<div class="v">' + escapar(propio.bucket || "NO_CONFIRMADO") + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Carreraje Home</div>' +
              '<div class="v">' + detalleCarreraje(r.carrerajeHome) + '</div>' +
            '</div>' +

            '<div class="medicion">' +
              '<div class="t">Carreraje Away</div>' +
              '<div class="v">' + detalleCarreraje(r.carrerajeAway) + '</div>' +
            '</div>' +

          '</div>' +

          '<div class="total-central">' +
            '<div class="tit">Fuerza de Equipo F5</div>' +
            '<div class="mediciones" style="margin-bottom:0;">' +
              bloqueFuerzaEquipo("Fuerza F5 visitante", fuerzaVisitante) +
              bloqueFuerzaEquipo("Fuerza F5 local", fuerzaLocal) +
              bloqueEnfrentamientos(enfrentamientos) +
              bloqueAbridor("Abridor visitante", abridorVisitante) +
              bloqueAbridor("Abridor local", abridorLocal) +
            '</div>' +
          '</div>' +

          '<div class="brujula-wrap">' +
            brujulaSvg +
          '</div>' +

          '<div class="brujula-cap">' +
            (
              tieneDireccion
                ? 'viene de ' + grados + '° → va hacia ' + vaHacia + '°'
                : 'Dirección de viento: NO_CONFIRMADO'
            ) +
          '</div>' +

          '<details class="detalle">' +
            '<summary>Ver detalle completo</summary>' +
            '<div><b>Estado:</b> ' + estadoPropio + '</div>' +
            '<div><b>Local bruto:</b> ' + fmtPct(propio.porcentajeLocal) + '</div>' +
            '<div><b>Visitante bruto:</b> ' + fmtPct(propio.porcentajeVisitante) + '</div>' +
            '<div><b>Empate:</b> ' + fmtPct(propio.porcentajeEmpate) + '</div>' +
            '<div><b>Local dos vías:</b> ' + fmtPct(propio.porcentajeLocalDosVias) + '</div>' +
            '<div><b>Visitante dos vías:</b> ' + fmtPct(propio.porcentajeVisitanteDosVias) + '</div>' +
            '<div><b>Detalle:</b> ' + escapar(propio.detalle || "") + '</div>' +
          '</details>' +

        '</div>';
    });

    listaEl.innerHTML = html;

  } catch (e) {
    log("ERROR: " + (e && e.message ? e.message : e));
  } finally {
    corriendo = false;
    btn.disabled = false;
    btn.textContent = "CORRER F5 AUTOMÁTICO (juegos de hoy)";
  }
}

document
  .getElementById("btnCorrer")
  .addEventListener("click", correrTodo);

var autoIntervalId = null;

document
  .getElementById("btnAuto")
  .addEventListener("click", function() {
    var btn = this;

    if (autoIntervalId) {
      clearInterval(autoIntervalId);
      autoIntervalId = null;

      btn.classList.remove("activo");
      btn.textContent = "🔄 Auto-actualizar cada 30 min: OFF";
    } else {
      autoIntervalId = setInterval(
        correrTodo,
        30 * 60 * 1000
      );

      btn.classList.add("activo");
      btn.textContent = "🔄 Auto-actualizar cada 30 min: ON";
    }
  });
</script>

</body>
</html>
