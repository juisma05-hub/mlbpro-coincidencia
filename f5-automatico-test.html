<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MLBPro · F5 Automático (juegos reales de hoy)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; }
  header { padding:14px 16px; border-bottom:1px solid #30363d; }
  h1 { font-size:15px; margin:0; }
  main { padding:14px; max-width:900px; margin:0 auto; }
  .go { width:100%; border:0; border-radius:10px; padding:16px; font-size:15px; font-weight:800; color:#fff; background:#2563eb; cursor:pointer; margin-bottom:10px; }
  .go:disabled { background:#30363d; color:#8b949e; }
  .go-auto { width:100%; border:0; border-radius:10px; padding:12px; font-size:13px; font-weight:800; color:#fff; background:#30363d; cursor:pointer; margin-bottom:10px; }
  .go-auto.activo { background:#238636; }
  #console { margin-top:10px; background:#010409; border:1px solid #30363d; border-radius:8px; padding:12px; min-height:60px; max-height:70vh; overflow:auto; font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; word-break:break-word; }
  .juego { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; margin-bottom:10px; }
  .juego h3 { margin:0 0 6px; font-size:14px; color:#79c0ff; }
  .resumen { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:8px 10px; margin-bottom:8px; }
  .proy { margin-top:8px; padding-top:8px; border-top:1px dashed #30363d; }
  .proy .lbl { color:#ffd60a; font-weight:800; }
  .detalle summary { cursor:pointer; color:#79c0ff; font-size:12px; margin-top:6px; }
  .equipos { display:flex; justify-content:space-between; font-size:16px; font-weight:800; color:#e6edf3; margin-bottom:2px; }
  .venue { font-size:11.5px; color:#8b949e; margin-bottom:8px; }
  .congelada { font-size:11.5px; color:#79c0ff; margin-bottom:8px; }
  .mercado { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:8px 10px; margin-bottom:8px; }
  .mercado-titulo { font-size:11px; text-transform:uppercase; letter-spacing:0.4px; color:#8b949e; font-weight:700; margin-bottom:4px; }
  .mercado-fila { display:flex; justify-content:space-between; font-size:13.5px; padding:2px 0; }
  .mercado-fila span:first-child { color:#c9d1d9; }
  .mercado-fila span:last-child { font-weight:800; color:#e6edf3; }
  .reservado { background:#0d1117; border:1px dashed #30363d; border-radius:8px; padding:8px 10px; margin-bottom:8px; font-size:12px; color:#6e7681; }
  .reservado div { padding:2px 0; }
</style>
</head>
<body>
<header><h1>MLBPro · F5 Automático — juegos reales de hoy</h1></header>
<main>
  <button id="btnCorrer" class="go">CORRER F5 AUTOMÁTICO (juegos de hoy)</button>
  <button id="btnAuto" class="go-auto">🔄 Auto-actualizar cada 30 min: OFF (necesita esta pestaña abierta)</button>
  <div id="lista"></div>
  <div id="console">Pulsa el botón.</div>
</main>

<script src="mlb-routes.js"></script>
<script src="estadios.js"></script>
<script src="clima-cache.js"></script>
<script src="jalar-clima.js"></script>
<script src="jalar-linea-f5.js"></script>
<script src="jalar-lineup.js"></script>
<script src="arsenal-master.js"></script>
<script src="batters-vspitch.js"></script>
<script src="pitchers-master.js"></script>
<script src="catchers-master.js"></script>
<script src="factor-arsenal-lineup.js"></script>
<script src="perfil-pitcher-builder.js"></script>
<script src="proyeccion-pitcher-temprana.js"></script>

<script src="f5-estadio.js"></script>
<script src="f5-roof.js"></script>
<script src="f5-temperatura.js"></script>
<script src="f5-viento.js"></script>
<script src="f5-pitcher.js"></script>
<script src="f5-coincidencia.js"></script>
<script src="f5-carreraje.js"></script>
<script src="f5-moneyline.js"></script>
<script src="f5-automatico.js"></script>

<script>
  var consoleEl = document.getElementById("console");
  var listaEl = document.getElementById("lista");
  function log(t){ var d=document.createElement("div"); d.textContent=t; consoleEl.appendChild(d); consoleEl.scrollTop=consoleEl.scrollHeight; }

  async function correrTodo(){
    var btn=document.getElementById("btnCorrer");
    btn.disabled=true; btn.textContent="TRABAJANDO…";
    consoleEl.textContent=""; listaEl.innerHTML="";
    try {
      var resultados = await f5AutomaticoHoy(log);
      var html = "";
      resultados.forEach(function(r){
        var lm = r.lineaMercadoF5;
        var congelTxt = (lm && lm.congelada) ? " 🧊 (línea CONGELADA pre-juego)" : "";
        var mlTxt = (lm && lm.moneylineF5) ? ('Home '+lm.moneylineF5.home_price+' / Away '+lm.moneylineF5.away_price) : 'N/C';
        var ouTxt = (lm && lm.totalF5) ? (lm.totalF5.point+' (O '+lm.totalF5.over_price+' / U '+lm.totalF5.under_price+')') : 'N/C';
        var rlTxt = (lm && lm.runlineF5) ? lm.runlineF5.point : 'N/C';

        var partes = r.juego.split(" @ ");
        var awayNombre = partes[0] || "Away";
        var homeNombre = partes[1] || "Home";

        function fmtAmerican(n) {
          if (typeof n !== "number" || isNaN(n)) return "N/C";
          return (n > 0 ? "+" : "") + n;
        }
        function fmtPoint(n) {
          if (typeof n !== "number" || isNaN(n)) return "N/C";
          return (n > 0 ? "+" : "") + n;
        }

        var mlAwayTxt = (lm && lm.moneylineF5) ? fmtAmerican(lm.moneylineF5.away_price) : "N/C";
        var mlHomeTxt = (lm && lm.moneylineF5) ? fmtAmerican(lm.moneylineF5.home_price) : "N/C";

        // CONFIRMADO en jalar-linea-f5.js: runlineF5.point es el punto del
        // HOME (se lee de outsR[o2].point cuando outsR[o2].name === home).
        // El punto del away no se guarda como campo propio, pero en un
        // mercado de spread de 2 vías el punto contrario es siempre la
        // negación exacta del otro (estructura del mercado, no un dato
        // inventado). rlHomePointTxt/rlAwayPointTxt usan ese único campo
        // real (.point) tal cual, solo con el signo invertido para away.
        var rlHomePointTxt = (lm && lm.runlineF5 && typeof lm.runlineF5.point === "number") ? fmtPoint(lm.runlineF5.point) : "N/C";
        var rlAwayPointTxt = (lm && lm.runlineF5 && typeof lm.runlineF5.point === "number") ? fmtPoint(-lm.runlineF5.point) : "N/C";

        var totalPointTxt = (lm && lm.totalF5 && typeof lm.totalF5.point === "number") ? lm.totalF5.point : "N/C";
        var totalOverTxt = (lm && lm.totalF5) ? fmtAmerican(lm.totalF5.over_price) : "N/C";
        var totalUnderTxt = (lm && lm.totalF5) ? fmtAmerican(lm.totalF5.under_price) : "N/C";

        var resumenHtml =
          '<div class="equipos">'+
            '<div class="equipo">'+awayNombre+'</div>'+
            '<div class="equipo">'+homeNombre+'</div>'+
          '</div>'+
          '<div class="venue">'+(r.venue||"?")+'</div>'+
          (congelTxt ? '<div class="congelada">🧊 línea CONGELADA pre-juego</div>' : '')+
          '<div class="mercado">'+
            '<div class="mercado-titulo">Moneyline F5</div>'+
            '<div class="mercado-fila"><span>Away</span><span>'+mlAwayTxt+'</span></div>'+
            '<div class="mercado-fila"><span>Home</span><span>'+mlHomeTxt+'</span></div>'+
          '</div>'+
          '<div class="mercado">'+
            '<div class="mercado-titulo">Run Line F5</div>'+
            '<div class="mercado-fila"><span>Away</span><span>'+rlAwayPointTxt+'</span></div>'+
            '<div class="mercado-fila"><span>Home</span><span>'+rlHomePointTxt+'</span></div>'+
          '</div>'+
          '<div class="mercado">'+
            '<div class="mercado-titulo">Total F5</div>'+
            '<div class="mercado-fila"><span>O '+totalPointTxt+'</span><span>'+totalOverTxt+'</span></div>'+
            '<div class="mercado-fila"><span>U '+totalPointTxt+'</span><span>'+totalUnderTxt+'</span></div>'+
          '</div>'+
          '<div class="reservado">'+
            '<div>🌡️ Clima — pendiente</div>'+
            '<div>🧭 Brújula — pendiente</div>'+
            '<div>💨 Trayectoria del viento — pendiente</div>'+
            '<div>📈 Línea MLBPro — pendiente</div>'+
            '<div>🎯 Score proyectado — pendiente</div>'+
          '</div>';

        /* ESPACIO RESERVADO (ver arriba, sección .reservado): Clima,
           Brújula, Trayectoria del viento, Línea MLBPro y Score proyectado
           se agregan cuando cada pieza esté lista y confirmada, una por
           una — no se inventa nada todavía. */

        html += '<div class="juego">'+
          resumenHtml+
          '<details class="detalle"><summary>Ver detalle completo</summary>'+
          '<div><b>Coincidencia:</b> '+r.coincidencia.estado+' ('+r.coincidencia.confirmados+')</div>'+
          '<div><b>Carreraje home:</b> '+r.carrerajeHome.estado+'</div>'+
          '<div><b>Carreraje away:</b> '+r.carrerajeAway.estado+'</div>'+
          '<div><b>MoneyLine F5 (propio):</b> '+r.moneyline.estado+(r.moneyline.ventaja?(' — '+r.moneyline.ventaja):'')+'</div>'+
          '<div><b>Línea mercado F5 (Run Line):</b> '+rlTxt+'</div>'+
          '<div><b>Línea mercado F5 (Money Line):</b> '+mlTxt+'</div>'+
          '<div><b>Línea mercado F5 (Over/Under):</b> '+ouTxt+'</div>'+
          '</details>'+
        '</div>';
      });
      listaEl.innerHTML = html;
      log(JSON.stringify(resultados, null, 2));
    } catch(e) {
      log("ERROR: "+(e&&e.message?e.message:e));
    } finally {
      btn.disabled=false; btn.textContent="CORRER F5 AUTOMÁTICO (juegos de hoy)";
    }
  }

  document.getElementById("btnCorrer").addEventListener("click", correrTodo);

  var autoIntervalId = null;
  document.getElementById("btnAuto").addEventListener("click", function(){
    var btn = this;
    if (autoIntervalId) {
      clearInterval(autoIntervalId);
      autoIntervalId = null;
      btn.classList.remove("activo");
      btn.textContent = "🔄 Auto-actualizar cada 30 min: OFF (necesita esta pestaña abierta)";
    } else {
      autoIntervalId = setInterval(correrTodo, 30*60*1000);
      btn.classList.add("activo");
      btn.textContent = "🔄 Auto-actualizar cada 30 min: ON (no cierres esta pestaña)";
    }
  });
</script>
</body>
</html>
