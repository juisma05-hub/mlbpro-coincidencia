<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloques · Test</title>
<style>
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; padding:16px; }
  .b { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; margin-bottom:12px; }
  .t { font-weight:800; font-size:15px; }
  .s { font-size:12px; color:#8b949e; margin-top:4px; }
  .g { font-size:12px; color:#ccc; padding:3px 0; border-bottom:1px solid #21262d; }
</style>
</head>
<body>
<h2>Bloques desde cache</h2>
<div id="out">Cargando...</div>

<script src="clima-cache.js"></script>
<script src="bloques-serie.js"></script>
<script src="bloques-trayectoria.js"></script>
<script src="bloques-carreraje.js"></script>
<script>
  // ============================================================
  // FUNCIÓN: horaLocalEstadio(g)
  // ENTRADA: objeto de juego del caché histórico (climaLeerCache())
  // FUENTE ÚNICA: g.game_time (UTC, viene de g.gameDate de MLB)
  // ZONA HORARIA: g.timezone (viene del registro del caché, NUNCA
  //   del dispositivo del usuario)
  // SALIDA: string "h:mm AM/PM" en hora local del estadio, o el
  //   string "NO_CONFIRMADA" si falta/está inválido game_time o
  //   timezone. NO inventa hora en ningún caso.
  // NO TOCA: jalar-clima.js, clima-cache.js, bloques-serie.js,
  //   bloques-trayectoria.js, bloques-carreraje.js, ni la línea FINAL.
  // NO AGREGA FETCH: usa exclusivamente datos ya presentes en el
  //   objeto g del caché en memoria.
  // ============================================================
  function horaLocalEstadio(g) {
    if (!g ||
        typeof g.game_time !== "string" || g.game_time.length === 0 ||
        typeof g.timezone !== "string" || g.timezone.length === 0) {
      return "NO_CONFIRMADA";
    }
    var d = new Date(g.game_time);
    if (isNaN(d.getTime())) return "NO_CONFIRMADA";
    try {
      var fmt = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        minute: "2-digit",
        hour12: true,
        timeZone: g.timezone
      });
      return fmt.format(d);
    } catch (e) {
      // timeZone inválido/desconocido -> no inventar hora
      return "NO_CONFIRMADA";
    }
  }

  var out = document.getElementById("out");
  try {
    var hist = climaLeerCache();
    var bloques = armarBloques(hist);
    bloques.sort(function(a,b){ return b.n_juegos - a.n_juegos; });
    out.innerHTML = "<p>Total juegos: "+hist.length+" · Total bloques: "+bloques.length+"</p>";
    var html = "";
    for (var i=0; i<bloques.length; i++){
      var b = bloques[i];
      var tr = analizarTrayectoria(b);
      var saltosTxt = tr.saltos.length ? (' · ⚠️ '+tr.saltos.length+' salto(s) anormal(es)') : '';
      var c = auditarCarreraje(b);
      var carrTxt = (c.estado==="NO CONFIRMADO") ? "NO CONFIRMADO" : (c.estado+" · prom "+c.prom+" ("+c.min+"-"+c.max+") · "+c.n+" juegos");
      html += '<div class="b"><div class="t">'+b.home_team+' · '+b.venue+'</div>'+
        '<div class="s">'+b.fecha_inicio+' a '+b.fecha_fin+' · '+b.n_juegos+' juegos · '+
        tr.tendencia+' ('+tr.min+'° a '+tr.max+'°)'+saltosTxt+'</div>'+
        '<div class="s">CARRERAJE: '+carrTxt+'</div>';
      for (var j=0;j<b.juegos.length;j++){
        var g=b.juegos[j];
        // Hora local del estadio: fuente única g.game_time + g.timezone.
        // Si falta cualquiera de los dos o son inválidos, se marca
        // HORA: NO_CONFIRMADA en vez de inventar o usar hora del dispositivo.
        var horaCalc = horaLocalEstadio(g);
        var horaTxt = (horaCalc === "NO_CONFIRMADA") ? "HORA: NO_CONFIRMADA" : horaCalc;
        // Score final: SOLO lee g.away_runs/g.home_runs, ya presentes en
        // este mismo objeto del caché histórico (climaLeerCache()) — sin
        // fetch nuevo, sin cruzar por gamePk/game_id. Si falta cualquiera
        // de los dos como número real, se marca NO_CONFIRMADO en vez de
        // inventar un score.
        var tieneScore = typeof g.away_runs === "number" && !isNaN(g.away_runs) &&
                          typeof g.home_runs === "number" && !isNaN(g.home_runs);
        var finalTxt = tieneScore ? ("FINAL: "+g.away_runs+" - "+g.home_runs) : "FINAL: NO_CONFIRMADO";
        html += '<div class="g">'+g.date+' · '+horaTxt+' · '+(g.away_team||"?")+' / '+(g.home_team||"?")+
          ' · '+(g.temperature_f!==undefined?g.temperature_f+"°":"?")+
          ' · '+finalTxt+'</div>';
      }
      html += '</div>';
    }
    out.innerHTML += html;
  } catch(e){
    out.innerHTML = "ERROR: " + (e && e.message ? e.message : e);
  }
</script>
</body>
</html>
