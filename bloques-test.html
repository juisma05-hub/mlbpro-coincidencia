<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloques ÂṖ Test</title>
<style>
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; padding:16px; }
  .b { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; margin-bottom:12px; }
  .t { font-weight:800; font-size:15px; }
  .s { font-size:12px; color:#8b949e; margin-top:4px; }
  .g { font-size:12px; color:#ccc; padding:3px 0; border-bottom:1px solid #21262d; }
</style>
</head>
<body>
<h2>Bloques desde cache</h2>
<div id="out">Cargando...</div>

<script src="clima-cache.js"></script>
<script src="bloques-serie.js"></script>
<script src="bloques-trayectoria.js"></script>
<script src="bloques-carreraje.js"></script>
<script>
  var out = document.getElementById("out");
  try {
    var hist = climaLeerCache();
    var bloques = armarBloques(hist);
    bloques.sort(function(a,b){ return b.n_juegos - a.n_juegos; });
    out.innerHTML = "<p>Total juegos: "+hist.length+" ÂṖ Total bloques: "+bloques.length+"</p>";
    var html = "";
    for (var i=0; i<bloques.length; i++){
      var b = bloques[i];
      var tr = analizarTrayectoria(b);
      var saltosTxt = tr.saltos.length ? (' ÂṖ â ïẁ '+tr.saltos.length+' salto(s) anormal(es)') : '';
      var c = auditarCarreraje(b);
      var carrTxt = (c.estado==="NO CONFIRMADO") ? "NO CONFIRMADO" : (c.estado+" ÂṖ prom "+c.prom+" ("+c.min+"-"+c.max+") ÂṖ "+c.n+" juegos");
      html += '<div class="b"><div class="t">'+b.home_team+' ÂṖ '+b.venue+'</div>'+
        '<div class="s">'+b.fecha_inicio+' a '+b.fecha_fin+' ÂṖ '+b.n_juegos+' juegos ÂṖ '+
        tr.tendencia+' ('+tr.min+'ÂḞ a '+tr.max+'ÂḞ)'+saltosTxt+'</div>'+
        '<div class="s">CARRERAJE: '+carrTxt+'</div>';
      for (var j=0;j<b.juegos.length;j++){
        var g=b.juegos[j];
        // Score final: SOLO lee g.away_runs/g.home_runs, ya presentes en
        // este mismo objeto del cachÃ© histÃġrico (climaLeerCache()) â sin
        // fetch nuevo, sin cruzar por gamePk/game_id. Si falta cualquiera
        // de los dos como nÃẃmero real, se marca NO_CONFIRMADO en vez de
        // inventar un score.
        var tieneScore = typeof g.away_runs === "number" && !isNaN(g.away_runs) &&
                          typeof g.home_runs === "number" && !isNaN(g.home_runs);
        var finalTxt = tieneScore ? ("FINAL: "+g.away_runs+" - "+g.home_runs) : "FINAL: NO_CONFIRMADO";
        html += '<div class="g">'+g.date+' ÂṖ '+(g.away_team||"?")+' / '+(g.home_team||"?")+
          ' ÂṖ '+(g.temperature_f!==undefined?g.temperature_f+"ÂḞ":"?")+
          ' ÂṖ '+finalTxt+'</div>';
      }
      html += '</div>';
    }
    out.innerHTML += html;
  } catch(e){
    out.innerHTML = "ERROR: " + (e && e.message ? e.message : e);
  }
</script>
</body>
</html>
