<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MLBPro · F5 Motor Completo (prueba manual)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; }
  header { padding:14px 16px; border-bottom:1px solid #30363d; }
  h1 { font-size:15px; margin:0; }
  main { padding:14px; max-width:900px; margin:0 auto; }
  .go { width:100%; border:0; border-radius:10px; padding:16px; font-size:15px; font-weight:800; color:#fff; background:#2563eb; cursor:pointer; margin-bottom:10px; }
  .go:disabled { background:#30363d; color:#8b949e; }
  textarea { width:100%; min-height:160px; background:#010409; color:#e6edf3; border:1px solid #30363d; border-radius:8px; padding:10px; font-family:ui-monospace,monospace; font-size:12px; margin-bottom:10px; }
  label { font-size:12px; color:#8b949e; display:block; margin-bottom:4px; }
  .bloque { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; margin-bottom:12px; }
  .bloque h2 { font-size:13px; margin:0 0 8px; color:#79c0ff; }
  #console { margin-top:10px; background:#010409; border:1px solid #30363d; border-radius:8px; padding:12px; min-height:60px; max-height:70vh; overflow:auto; font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; word-break:break-word; }
  .estado { font-weight:800; }
  .estado.ok { color:#3fb950; }
  .estado.parcial { color:#ffd60a; }
  .estado.baja { color:#ff453a; }
</style>
</head>
<body>
<header><h1>MLBPro · F5 Motor Completo (F1-F5 + Carreraje + MoneyLine) — prueba manual</h1></header>
<main>

  <div class="bloque">
    <h2>DATOS DE HOY (JSON)</h2>
    <label>Pega aquí el objeto datosHoy</label>
    <textarea id="datosHoyInput"></textarea>
  </div>

  <div class="bloque">
    <h2>DATOS HISTÓRICO (JSON)</h2>
    <label>Pega aquí el objeto datosHistorico</label>
    <textarea id="datosHistoricoInput"></textarea>
  </div>

  <button id="btnCargarEjemplo" class="go" style="background:#30363d;">CARGAR EJEMPLO DE PRUEBA</button>
  <button id="btnCorrer" class="go">CORRER F5 COMPLETO (Coincidencia + Carreraje + MoneyLine)</button>

  <div id="console">Pulsa "cargar ejemplo" o pega tus propios datosHoy/datosHistorico, luego pulsa "correr".</div>
</main>

<script src="f5-estadio.js"></script>
<script src="f5-roof.js"></script>
<script src="f5-temperatura.js"></script>
<script src="f5-viento.js"></script>
<script src="f5-pitcher.js"></script>
<script src="f5-coincidencia.js"></script>
<script src="f5-carreraje.js"></script>
<script src="f5-moneyline.js"></script>

<script>
  var consoleEl = document.getElementById("console");
  function log(t){ var d=document.createElement("div"); d.textContent=t; consoleEl.appendChild(d); consoleEl.scrollTop=consoleEl.scrollHeight; }
  function logHtml(h){ var d=document.createElement("div"); d.innerHTML=h; consoleEl.appendChild(d); consoleEl.scrollTop=consoleEl.scrollHeight; }

  var EJEMPLO_HOY = {
    juego: "Colorado Rockies @ Los Angeles Dodgers",
    venue: "Dodger Stadium",
    roof: "open",
    tempF: 78,
    vientoMph: 6,
    direccionViento: "SO",
    perfilPitcher: {
      mano: "R",
      kPct: 28.5,
      bbPct: 6.2,
      whiffPct: 31.0,
      xera: 3.15,
      xwoba: 0.298,
      arsenal: ["FF","SL","CH"],
      ipRecientes: [6,5.1,6.2]
    }
  };

  var EJEMPLO_HISTORICO = {
    venue: "Dodger Stadium",
    roof: "open",
    tempF: 75,
    vientoMph: 8,
    direccionViento: "SO",
    perfilPitcher: {
      mano: "R",
      kPct: 27.0,
      bbPct: 7.0,
      whiffPct: 29.5,
      xera: 3.30,
      xwoba: 0.305,
      arsenal: ["FF","SL","CH"],
      ipRecientes: [5.2,6,5]
    }
  };

  document.getElementById("btnCargarEjemplo").addEventListener("click", function(){
    document.getElementById("datosHoyInput").value = JSON.stringify(EJEMPLO_HOY, null, 2);
    document.getElementById("datosHistoricoInput").value = JSON.stringify(EJEMPLO_HISTORICO, null, 2);
    log("Ejemplo cargado en los dos campos.");
  });

  function claseEstado(estado){
    if(estado==="COINCIDENCIA COMPLETA") return "ok";
    if(estado==="COINCIDENCIA PARCIAL") return "parcial";
    return "baja";
  }

  document.getElementById("btnCorrer").addEventListener("click", function(){
    consoleEl.textContent = "";
    try{
      var datosHoy = JSON.parse(document.getElementById("datosHoyInput").value || "{}");
      var datosHistorico = JSON.parse(document.getElementById("datosHistoricoInput").value || "{}");

      log("Corriendo f5Coincidencia...");
      var coincidencia = f5Coincidencia(datosHoy, datosHistorico);
      logHtml("<b>ESTADO: <span class='estado "+claseEstado(coincidencia.estado)+"'>"+coincidencia.estado+"</span></b> ("+coincidencia.confirmados+" confirmados)");
      log(JSON.stringify(coincidencia, null, 2));

      log("---");
      log("Nota: Carreraje y MoneyLine necesitan cruceArsenal (woba_esperado) de");
      log("CADA lado (local y visitante), que sale de factor-arsenal-lineup.js /");
      log("batters-vspitch.js con datos reales del lineup rival. Esta prueba");
      log("manual no simula ese cruce todavía — se conecta cuando exista la");
      log("pieza automática del checkpoint (paso pendiente #2).");

    }catch(e){
      log("ERROR: "+(e&&e.message?e.message:e));
    }
  });
</script>
</body>
</html>
