<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MLBPro · Día Pasado TEST</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; }
  header { padding:14px 16px; border-bottom:1px solid #30363d; }
  h1 { font-size:17px; margin:0; }
  main { padding:16px; max-width:900px; margin:0 auto; }
  .fila { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  input[type="date"] { flex:1; background:#161b22; color:#e6edf3; border:1px solid #30363d; border-radius:10px; padding:14px; font-size:16px; }
  .go { border:0; border-radius:10px; padding:14px 18px; font-size:16px; font-weight:800; color:#fff; background:#238636; cursor:pointer; }
  .go:disabled { background:#30363d; color:#8b949e; }

  .juego { background:#161b22; border:1px solid #30363d; border-radius:14px; padding:16px; margin-top:14px; }
  .matchup { font-size:18px; font-weight:800; }
  .estadio { font-size:13px; color:#8b949e; margin:3px 0; }

  .hoychips { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
  .chip { font-size:12px; background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:4px 9px; color:#c9d1d9; }
  .chip b { color:#fff; }

  .panel { display:flex; gap:8px; margin:12px 0 4px; }
  .pbox { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:10px; padding:10px; text-align:center; }
  .pbox .lbl { font-size:10px; color:#8b949e; letter-spacing:0.3px; }
  .pbox .val { font-size:23px; font-weight:800; margin-top:2px; }
  .v-coin { color:#3fb950; }
  .v-coin.mid{color:#ffd60a;} .v-coin.bad{color:#ff453a;}
  .v-run  { color:#79c0ff; }

  .carr { display:flex; gap:8px; margin:8px 0 2px; }
  .cbox { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:10px; padding:10px; text-align:center; }
  .cbox .lbl { font-size:10px; color:#8b949e; letter-spacing:0.3px; }
  .cbox .val { font-size:20px; font-weight:800; margin-top:2px; }
  .cbox.real .val { color:#3fb950; }
  .cbox.estim .val { color:#79c0ff; }
  .cbox .dif { font-size:10px; color:#8b949e; margin-top:2px; }

  .serieparque { margin-top:12px; border-top:1px solid #30363d; padding-top:10px; }
  .serieparque .sphdr { font-size:12px; color:#8b949e; font-weight:700; letter-spacing:0.5px; }
  .sub { background:#0d1117; border:1px solid #21262d; border-radius:8px; padding:10px; margin:8px 0; }
  .sub .top { font-size:13px; font-weight:700; margin-bottom:6px; }
  .sub .fecha { color:#79c0ff; }
  .sub .nums { display:flex; flex-wrap:wrap; gap:5px; }

  #console { margin-top:16px; background:#010409; border:1px solid #30363d; border-radius:8px; padding:12px; min-height:50px; max-height:25vh; overflow:auto; font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
</style>
</head>
<body>
<header><h1>MLBPro · Día Pasado TEST</h1></header>
<main>
  <div class="fila">
    <input type="date" id="fecha" />
    <button id="go" class="go">VER</button>
  </div>
  <div id="lista"></div>
  <div id="console">Elige una fecha pasada y pulsa VER.</div>
</main>

<script src="mlb-routes.js"></script>
<script src="estadios.js"></script>
<script src="clima-cache.js"></script>
<script src="score-match.js"></script>
<script src="calcular-coincidencia.js"></script>
<script src="resumen-juego.js"></script>

<script>
  var consoleEl = document.getElementById("console");
  var listaEl = document.getElementById("lista");
  function log(t){ var d=document.createElement("div"); d.textContent=t; consoleEl.appendChild(d); consoleEl.scrollTop=consoleEl.scrollHeight; }

  var MESES_CORTOS = {"01":"Ene","02":"Feb","03":"Mar","04":"Abr","05":"May","06":"Jun","07":"Jul","08":"Ago","09":"Sep","10":"Oct","11":"Nov","12":"Dic"};
  function fechaBonita(date){
    if(!date || typeof date!=="string" || date.length<10) return date||"?";
    var yy=date.slice(0,4), mm=date.slice(5,7), dd=date.slice(8,10);
    var mes=MESES_CORTOS[mm]||mm;
    return dd+" "+mes+" "+yy.slice(2);
  }

  document.getElementById("go").addEventListener("click", function(){
    var btn=this; btn.disabled=true;
    consoleEl.textContent=""; listaEl.innerHTML="";
    try {
      var fecha = document.getElementById("fecha").value;
      if(!fecha){ log("No elegiste fecha."); return; }
      log("Fecha pedida: " + fecha);

      var cache = climaLeerCache();
      log("Filas en cache: " + cache.length);
      if(cache.length === 0){
        log("CACHE VACIO. Abre primero el index y pulsa COINCIDENCIA para llenar el cache.");
        return;
      }

      var delDia = cache.filter(function(r){ return r.date === fecha; });
      log("Juegos en cache ese dia: " + delDia.length);
      if(delDia.length === 0){
        log("No hay juegos guardados para " + fecha + ".");
        return;
      }

      var html = "";
      for(var i=0;i<delDia.length;i++){
        var g = delDia[i];
        var clima = {
          temperature_f: g.temperature_f, windspeed_mph: g.windspeed_mph,
          humidity_pct: g.humidity_pct, precipitation_mm: g.precipitation_mm,
          wind_dir: g.wind_dir, venueName: g.venue
        };
        var climaOk = (typeof g.temperature_f === "number");
        var r = climaOk ? calcularCoincidencia(clima) : null;

        if(r && r.ranked && r.ranked.length){
          r.ranked = r.ranked.filter(function(h){
            var mismoGameId = (g.game_id !== undefined && g.game_id !== null && h.game_id !== undefined && h.game_id !== null)
              ? (h.game_id === g.game_id) : false;
            var mismoFechaVenue = (h.date === g.date && h.venue === g.venue && h.home_team === g.home_team && h.away_team === g.away_team);
            return !(mismoGameId || mismoFechaVenue);
          });
          r.top = r.ranked.length ? r.ranked[0] : null;
          r.cls = r.top && r.top.score >= 80 ? "ok" : (r.top && r.top.score >= 60 ? "mid" : "bad");
        }
        html += tarjeta(g, r, i, climaOk);
      }
      listaEl.innerHTML = html;
      log("LISTO.");
    } catch(e) {
      log("ERROR REAL: " + (e && e.message ? e.message : e));
    } finally {
      btn.disabled=false;
    }
  });

  function tarjeta(g, r, idx, climaOk){
    var away = g.away_team || "?";
    var home = g.home_team || "?";
    var venue = g.venue || "SIN PARQUE";

    var sc = r && r.top ? r.top.score : null;
    var cls = r ? r.cls : "bad";
    var coinTxt = (!climaOk) ? "—" : (sc===null ? "—" : sc+"%");

    var realRuns = null;
    if(g.away_runs!==null && g.away_runs!==undefined && g.home_runs!==null && g.home_runs!==undefined){
      realRuns = g.away_runs + g.home_runs;
    }
    var marcadorTxt = (realRuns!==null)
      ? g.away_runs+'-'+g.home_runs+' ('+realRuns+') · '+(g.status||"")
      : '— sin datos · '+(g.status||"");

    var hoychips = '<div class="hoychips">'+
      '<span class="chip">🌡️ <b>'+(g.temperature_f!==undefined?g.temperature_f+"°":"?")+'</b></span>'+
      '<span class="chip">🌬️ <b>'+(g.windspeed_mph!==undefined?g.windspeed_mph:"?")+'</b></span>'+
      '<span class="chip">🧭 dir <b>'+(g.wind_dir!==undefined && g.wind_dir!==null && g.wind_dir!==""?g.wind_dir:"N/C")+'</b></span>'+
      '<span class="chip">💧 <b>'+(g.humidity_pct!==undefined?g.humidity_pct+"%":"?")+'</b></span>'+
    '</div>';

    var sumScore=0, nScore=0, sumRuns=0, nRuns=0;
    var det5 = "";
    if(r && r.ranked && r.ranked.length){
      var parecidosOrden = r.ranked.slice().sort(function(a,b){
        return (a.date < b.date) ? 1 : ((a.date > b.date) ? -1 : 0);
      });
      for(var j=0;j<parecidosOrden.length;j++){
        var h=parecidosOrden[j];
        var ar = (h.away_runs!==undefined && h.away_runs!==null) ? h.away_runs : null;
        var hr = (h.home_runs!==undefined && h.home_runs!==null) ? h.home_runs : null;
        var carrChip;
        if(ar!==null && hr!==null){ var tot=ar+hr; carrChip='<span class="chip">⚾ <b>'+ar+'-'+hr+'</b> ('+tot+')</span>'; sumRuns+=tot; nRuns++; }
        else { carrChip='<span class="chip">⚾ sin marcador</span>'; }
        if(typeof h.score === "number"){ sumScore += h.score; nScore++; }
        det5 += '<div class="sub">'+
          '<div class="top"><span class="fecha">'+fechaBonita(h.date)+'</span> · '+(h.away_team||"?")+' / '+(h.home_team||"?")+'</div>'+
          '<div class="nums">'+
            '<span class="chip">🌡️ <b>'+(h.temperature_f!==undefined?h.temperature_f+"°":"?")+'</b></span>'+
            '<span class="chip">🌬️ <b>'+(h.windspeed_mph!==undefined?h.windspeed_mph:"?")+'</b></span>'+
            '<span class="chip">🧭 dir <b>'+(h.wind_dir!==undefined && h.wind_dir!==null && h.wind_dir!==""?h.wind_dir:"N/C")+'</b></span>'+
            '<span class="chip">💧 <b>'+(h.humidity_pct!==undefined?h.humidity_pct+"%":"?")+'</b></span>'+
            '<span class="chip">score <b>'+h.score+'%</b></span>'+
            carrChip+
          '</div>'+
        '</div>';
      }
    } else if(climaOk){
      det5 = '<div class="sub">Sin históricos para mostrar.</div>';
    } else {
      det5 = '<div class="sub">CLIMA NO NUMERICO ('+g.temperature_f+'): no se calcula.</div>';
    }

    var resumen = (typeof resumenJuego === "function" && r) ? resumenJuego(r) : null;
    var promScore = resumen ? resumen.coinc_prom : (nScore>0 ? Math.round(sumScore/nScore) : null);
    var estimRuns = resumen ? resumen.carreras_estim : (nRuns>0 ? (sumRuns/nRuns) : null);

    var panel =
      '<div class="panel">'+
        '<div class="pbox"><div class="lbl">COINCIDENCIA</div><div class="val v-coin '+cls+'">'+coinTxt+'</div></div>'+
        '<div class="pbox"><div class="lbl">COINC. PROMEDIO</div><div class="val v-run">'+(promScore!==null?promScore+"%":"—")+'</div></div>'+
      '</div>';

    var difTxt = "";
    if(realRuns!==null && estimRuns!==null){
      var dif = (realRuns - estimRuns);
      if(dif > 0)      difTxt = "+"+dif.toFixed(1)+" más de lo proyectado";
      else if(dif < 0) difTxt = dif.toFixed(1)+" menos de lo proyectado";
      else             difTxt = "exacto";
    }
    var scoreFinalTxt = "—";
    if(g.away_runs!==null && g.away_runs!==undefined && g.home_runs!==null && g.home_runs!==undefined){
      scoreFinalTxt = g.away_runs+'-'+g.home_runs;
    }
    var carr =
      '<div class="carr">'+
        '<div class="cbox estim"><div class="lbl">PROYECCIÓN APP</div><div class="val">'+(estimRuns!==null?estimRuns.toFixed(1):"—")+'</div><div class="dif">'+difTxt+'</div></div>'+
        '<div class="cbox real"><div class="lbl">SCORE FINAL</div><div class="val">'+scoreFinalTxt+'</div><div class="dif">'+(realRuns!==null?'('+realRuns+' carreras)':'lo que pasó')+'</div></div>'+
      '</div>';

    var bloque5 = '<div class="serieparque">'+
      '<div class="sphdr">5 PARECIDOS · CLIMA EN ESTE PARQUE</div>'+
      det5+'</div>';

    return '<div class="juego">'+
      '<div class="matchup">'+away+' @ '+home+'</div>'+
      '<div class="estadio">'+venue+'</div>'+
      '<div class="estadio">Marcador: '+marcadorTxt+'</div>'+
      hoychips +
      panel +
      carr +
      bloque5 +
      '</div>';
  }
</script>
</body>
</html>
